<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Daddy Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0F1F35;
      --navy-mid: #1A2F48;
      --navy-light: #243A57;
      --gold: #C49A2A;
      --gold-light: #E8C55A;
      --gold-pale: #FDF6E3;
      --gold-border: rgba(196,154,42,0.3);
      --blue-action: #2E86AB;
      --blue-light: #E3F2F9;
      --blue-border: rgba(46,134,171,0.3);
      --red: #E24B4A;
      --red-light: #FCEBEB;
      --red-border: rgba(226,75,74,0.35);
      --teal: #1D9E75;
      --teal-light: #E1F5EE;
      --amber: #D4880A;
      --amber-light: #FEF3DC;
      --page-bg: #F4F6F9;
      --card-bg: #FFFFFF;
      --text-primary: #1A1A2E;
      --text-secondary: #5A6478;
      --text-tertiary: #8E97A8;
      --border: rgba(0,0,0,0.08);
      --border-mid: rgba(0,0,0,0.12);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--page-bg);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--navy);
      padding: 20px 20px 18px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-inner { max-width: 600px; margin: 0 auto; display: flex; align-items: flex-start; justify-content: space-between; }
    .topbar-context { font-size: 12px; color: var(--gold-light); font-weight: 300; letter-spacing: 0.03em; margin-bottom: 3px; }
    .topbar-title { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 500; color: #fff; line-height: 1.1; }
    .topbar-actions { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 50%;
      border: 1px solid rgba(196,154,42,0.4);
      background: rgba(196,154,42,0.1);
      color: var(--gold-light);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px; line-height: 1;
      transition: background 0.15s, border-color 0.15s;
    }
    .icon-btn:hover { background: rgba(196,154,42,0.2); border-color: rgba(196,154,42,0.6); }

    /* ── MOMENTUM BANNER ── */
    .momentum {
      max-width: 600px; margin: 0 auto;
      background: var(--navy-mid);
      border-bottom: 1px solid var(--gold-border);
      padding: 12px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .momentum-icon { font-size: 20px; flex-shrink: 0; }
    .momentum-text { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.5; }
    .momentum-text strong { color: var(--gold-light); font-weight: 500; }

    /* ── MAIN SCROLL ── */
    .main { max-width: 600px; margin: 0 auto; padding: 20px 16px 120px; }

    /* ── SECTION LABELS ── */
    .section-label {
      font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-tertiary);
      padding: 0 4px; margin-bottom: 10px; margin-top: 24px;
    }
    .section-label:first-child { margin-top: 0; }

    /* ── FOCUS CARD ── */
    .focus-card {
      background: var(--card-bg);
      border: 1.5px solid var(--red);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 6px;
    }
    .focus-card.amber-mode { border-color: var(--amber); }
    .focus-header {
      background: var(--red-light);
      padding: 8px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .focus-card.amber-mode .focus-header { background: var(--amber-light); }
    .focus-header-label { font-size: 11px; font-weight: 500; color: #7A1F1F; }
    .focus-card.amber-mode .focus-header-label { color: #7A4A05; }
    .mention-badge {
      font-size: 10px; font-weight: 500;
      background: rgba(226,75,74,0.2); color: #7A1F1F;
      border-radius: 20px; padding: 2px 8px;
    }
    .focus-card.amber-mode .mention-badge { background: rgba(212,136,10,0.2); color: #7A4A05; }
    .focus-body { padding: 14px 14px 12px; }
    .focus-task-title {
      font-family: 'Fraunces', serif;
      font-size: 17px; font-weight: 500; line-height: 1.3;
      color: var(--text-primary); margin-bottom: 5px;
    }
    .focus-why { font-size: 12px; color: #A32D2D; margin-bottom: 10px; line-height: 1.4; }
    .focus-card.amber-mode .focus-why { color: #8C5006; }
    .chips-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
    .chip {
      font-size: 11px; padding: 3px 9px; border-radius: 20px;
      background: var(--page-bg); color: var(--text-secondary);
      border: 0.5px solid var(--border-mid);
    }
    .smart-block {
      background: var(--blue-light);
      border: 0.5px solid var(--blue-border);
      border-radius: var(--radius-sm);
      padding: 9px 11px;
      margin-bottom: 8px;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .smart-block:last-of-type { margin-bottom: 12px; }
    .smart-star { font-size: 13px; flex-shrink: 0; color: var(--blue-action); margin-top: 1px; }
    .smart-text { font-size: 12px; color: #1A4A62; line-height: 1.4; flex: 1; }
    .smart-text strong { font-weight: 500; }
    .smart-cta { font-size: 12px; font-weight: 500; color: var(--blue-action); white-space: nowrap; cursor: pointer; margin-top: 1px; flex-shrink: 0; }
    .smart-cta:hover { text-decoration: underline; }
    .focus-btns { display: flex; gap: 8px; }
    .btn-done {
      flex: 1; padding: 10px 14px;
      border-radius: var(--radius-sm); border: none;
      background: var(--red); color: #fff;
      font-size: 13px; font-weight: 500; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.15s;
    }
    .focus-card.amber-mode .btn-done { background: var(--amber); }
    .btn-done:hover { opacity: 0.88; }
    .btn-snooze {
      padding: 10px 14px; border-radius: var(--radius-sm);
      border: 0.5px solid var(--border-mid); background: transparent;
      color: var(--text-secondary); font-size: 13px; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s;
    }
    .btn-snooze:hover { background: var(--page-bg); }

    /* ── RELATIONSHIP CARD ── */
    .relationship-card {
      background: var(--gold-pale);
      border: 0.5px solid var(--gold-border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin-bottom: 6px;
    }
    .rel-row { display: flex; align-items: center; gap: 12px; padding: 6px 0; }
    .rel-row + .rel-row { border-top: 0.5px solid rgba(196,154,42,0.2); }
    .rel-icon { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; }
    .rel-info { flex: 1; min-width: 0; }
    .rel-title { font-size: 13px; font-weight: 500; color: #5C420A; margin-bottom: 1px; }
    .rel-sub { font-size: 11px; color: #8A6015; }
    .rel-days { text-align: right; flex-shrink: 0; }
    .rel-days-num { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; color: #5C420A; line-height: 1; }
    .rel-days-label { font-size: 10px; color: #8A6015; }
    .rel-add-btn {
      width: 100%; margin-top: 10px; padding: 7px;
      border: 0.5px dashed rgba(196,154,42,0.5);
      border-radius: var(--radius-sm); background: transparent;
      color: var(--gold); font-size: 12px; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s;
    }
    .rel-add-btn:hover { background: rgba(196,154,42,0.08); }
    .rel-delete {
      flex-shrink: 0; width: 22px; height: 22px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 16px; line-height: 1; color: rgba(92,66,10,0.35);
      cursor: pointer; transition: color 0.15s, background 0.15s;
      margin-left: 4px;
    }
    .rel-delete:hover { color: var(--red); background: var(--red-light); }

    /* ── TASK LIST ── */
    .task-list { display: flex; flex-direction: column; gap: 1px; }
    .task-item {
      background: var(--card-bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 11px 13px;
      display: flex; align-items: flex-start; gap: 10px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .task-item:hover { border-color: var(--border-mid); }
    .task-item:active { transform: scale(0.995); }
    .task-item.completing { opacity: 0.4; transform: scale(0.98); transition: all 0.3s; }

    .task-check {
      width: 19px; height: 19px; border-radius: 50%;
      border: 1.5px solid var(--border-mid);
      flex-shrink: 0; margin-top: 1px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      background: transparent;
    }
    .task-check:hover { border-color: var(--teal); }
    .task-check.checked { background: var(--teal); border-color: var(--teal); }
    .task-check.checked::after { content: '✓'; font-size: 11px; color: #fff; font-weight: 500; }
    .task-check.urgent { border-color: var(--amber); }
    .task-check.smart-ready { border-color: var(--blue-action); }

    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 13px; line-height: 1.4; margin-bottom: 4px; color: var(--text-primary); }
    .task-title.done { text-decoration: line-through; color: var(--text-tertiary); }
    .task-chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .task-chip {
      font-size: 10px; padding: 2px 7px; border-radius: 20px;
      background: var(--page-bg); color: var(--text-tertiary);
      border: 0.5px solid var(--border);
    }
    .task-chip.smart-chip { background: var(--blue-light); color: #1A4A62; border-color: var(--blue-border); }
    .task-chip.urgent-chip { background: var(--amber-light); color: #7A4A05; border-color: rgba(212,136,10,0.3); }

    .task-score {
      font-family: 'Fraunces', serif;
      font-size: 14px; font-weight: 500;
      color: var(--text-tertiary); flex-shrink: 0; margin-top: 1px;
    }
    .task-score.high { color: var(--amber); }
    .task-score.critical { color: var(--red); }

    /* ── COMPLETED SECTION ── */
    .completed-toggle {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 4px; cursor: pointer; color: var(--text-tertiary);
      font-size: 12px; user-select: none;
    }
    .completed-toggle:hover { color: var(--text-secondary); }
    .toggle-arrow { font-size: 10px; transition: transform 0.2s; }
    .toggle-arrow.open { transform: rotate(90deg); }
    .completed-list { display: none; }
    .completed-list.visible { display: flex; flex-direction: column; gap: 1px; }
    .task-item.done-item { opacity: 0.55; }
    .task-item.done-item:hover { opacity: 0.75; }

    /* ── GROUP HEADER ── */
    .group-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 4px 8px;
    }
    .group-title { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
    .group-count { font-size: 11px; color: var(--text-tertiary); }

    /* ── ADD ROW ── */
    .add-row {
      background: var(--card-bg);
      border: 0.5px dashed var(--border-mid);
      border-radius: var(--radius-md);
      padding: 11px 13px;
      display: flex; align-items: center; gap: 10px;
      color: var(--text-tertiary); font-size: 13px; cursor: pointer;
      margin-top: 2px;
      transition: border-color 0.15s, color 0.15s;
    }
    .add-row:hover { border-color: var(--gold-border); color: var(--gold); }
    .add-circle {
      width: 19px; height: 19px; border-radius: 50%;
      border: 1.5px solid var(--border-mid);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; line-height: 1; flex-shrink: 0;
      transition: border-color 0.15s;
    }
    .add-row:hover .add-circle { border-color: var(--gold); }

    /* ── STATS ROW ── */
    .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 4px; }
    .stat-card {
      background: var(--navy); border-radius: var(--radius-md);
      padding: 12px 14px;
    }
    .stat-num {
      font-family: 'Fraunces', serif;
      font-size: 26px; font-weight: 500; color: #fff; line-height: 1; margin-bottom: 3px;
    }
    .stat-num.gold { color: var(--gold-light); }
    .stat-num.red { color: #F09595; }
    .stat-label { font-size: 11px; color: rgba(255,255,255,0.45); }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(10,15,25,0.65);
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: var(--card-bg);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      width: 100%; max-width: 600px;
      padding: 24px 20px 36px;
      animation: slideUp 0.22s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-handle { width: 36px; height: 4px; background: var(--border-mid); border-radius: 2px; margin: 0 auto 20px; }
    .modal-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 500; margin-bottom: 20px; }

    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; display: block; }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 10px 12px;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-sm); background: var(--page-bg);
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      color: var(--text-primary); outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold); }
    .form-textarea { resize: vertical; min-height: 70px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .requester-row { display: flex; gap: 8px; }
    .requester-btn {
      flex: 1; padding: 8px; border-radius: var(--radius-sm);
      border: 0.5px solid var(--border-mid); background: transparent;
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      color: var(--text-secondary); cursor: pointer;
      transition: all 0.15s;
    }
    .requester-btn.selected { background: var(--navy); color: var(--gold-light); border-color: var(--navy); }

    .btn-submit {
      width: 100%; padding: 12px;
      background: var(--navy); color: var(--gold-light);
      border: none; border-radius: var(--radius-md);
      font-family: 'Fraunces', serif; font-size: 16px; font-weight: 500;
      cursor: pointer; transition: opacity 0.15s;
      margin-top: 8px;
    }
    .btn-submit:hover { opacity: 0.88; }
    .btn-cancel {
      width: 100%; padding: 10px;
      background: transparent; color: var(--text-tertiary);
      border: none; font-family: 'DM Sans', sans-serif; font-size: 13px;
      cursor: pointer; margin-top: 6px;
    }

    /* ── RELATIONSHIP MODAL ── */
    .rel-type-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
    .rel-type-btn {
      padding: 6px 12px; border-radius: 20px;
      border: 0.5px solid var(--border-mid); background: transparent;
      font-family: 'DM Sans', sans-serif; font-size: 12px;
      color: var(--text-secondary); cursor: pointer;
      transition: all 0.15s;
    }
    .rel-type-btn.selected { background: var(--gold-pale); border-color: var(--gold-border); color: #5C420A; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--navy); color: #fff;
      padding: 10px 18px; border-radius: 30px;
      font-size: 13px; z-index: 500;
      border: 1px solid var(--gold-border);
      transition: transform 0.25s ease-out, opacity 0.25s;
      opacity: 0; pointer-events: none; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-tertiary); }
    .empty-state-icon { font-size: 32px; margin-bottom: 12px; }
    .empty-state-text { font-size: 14px; line-height: 1.5; }

    /* ── TASK DETAIL ── */
    .detail-chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0; }
    .detail-chip {
      font-size: 12px; padding: 4px 10px; border-radius: 20px;
      background: var(--page-bg); border: 0.5px solid var(--border-mid);
      color: var(--text-secondary);
    }
    .detail-smart-block {
      background: var(--blue-light); border: 0.5px solid var(--blue-border);
      border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px;
    }
    .detail-smart-label { font-size: 10px; font-weight: 500; color: var(--blue-action); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .detail-smart-text { font-size: 13px; color: #1A4A62; line-height: 1.4; }
    .detail-smart-action {
      display: inline-block; margin-top: 6px;
      font-size: 12px; font-weight: 500; color: var(--blue-action);
      cursor: pointer; border: none; background: transparent;
      font-family: 'DM Sans', sans-serif; padding: 0;
    }
    .detail-actions { display: flex; gap: 8px; margin-top: 16px; }
    .btn-detail-done {
      flex: 1; padding: 11px;
      background: var(--navy); color: var(--gold-light);
      border: none; border-radius: var(--radius-md);
      font-family: 'Fraunces', serif; font-size: 15px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-detail-done:hover { opacity: 0.88; }
    .btn-detail-delete {
      padding: 11px 16px; border-radius: var(--radius-md);
      border: 0.5px solid var(--red-border); background: transparent;
      color: var(--red); font-size: 13px; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }

    /* ── GMAIL DIGEST ── */
    .gmail-digest {
      background: var(--card-bg);
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 6px;
    }
    .gmail-digest-header {
      background: var(--navy);
      padding: 10px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .gmail-digest-title { font-size: 12px; font-weight: 500; color: var(--gold-light); display: flex; align-items: center; gap: 8px; }
    .gmail-digest-meta { font-size: 11px; color: rgba(255,255,255,0.4); }
    .gmail-task-row {
      padding: 11px 14px;
      border-bottom: 0.5px solid var(--border);
      display: flex; align-items: flex-start; gap: 10px;
    }
    .gmail-task-row:last-child { border-bottom: none; }
    .gmail-task-source {
      font-size: 10px; font-weight: 500; padding: 2px 8px;
      border-radius: 20px; flex-shrink: 0; margin-top: 1px;
      white-space: nowrap;
    }
    .gmail-task-source.brittany { background: #FCE4EC; color: #880E4F; }
    .gmail-task-source.rylee { background: var(--blue-light); color: #1A4A62; }
    .gmail-task-source.georgia { background: var(--teal-light); color: #0D5C42; }
    .gmail-task-source.daisy { background: var(--amber-light); color: #7A4A05; }
    .gmail-task-source.school { background: var(--gold-pale); color: #5C420A; }
    .gmail-task-text { font-size: 13px; flex: 1; line-height: 1.4; color: var(--text-primary); }
    .gmail-task-add {
      font-size: 11px; font-weight: 500; color: var(--blue-action);
      cursor: pointer; flex-shrink: 0; margin-top: 2px; white-space: nowrap;
      border: none; background: none; font-family: 'DM Sans', sans-serif;
      padding: 0;
    }
    .gmail-task-add:hover { text-decoration: underline; }
    .gmail-task-add.added { color: var(--teal); cursor: default; }
    .gmail-empty {
      padding: 16px 14px; font-size: 13px; color: var(--text-tertiary);
      text-align: center;
    }
    .gmail-scanning {
      padding: 14px; text-align: center;
      font-size: 13px; color: var(--text-secondary);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 1s linear infinite; }
    .gmail-add-all {
      width: 100%; padding: 9px; border: none;
      background: var(--navy); color: var(--gold-light);
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: opacity 0.15s;
    }

<script>
// ─────────────────────────────────────────────
// SUPABASE
// ─────────────────────────────────────────────
const _sb = supabase.createClient(
  'https://lcghspaeauqyssrkhizu.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjZ2hzcGFlYXVxeXNzcmtoaXp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNTY0ODksImV4cCI6MjA5MjczMjQ4OX0._D6C8MpPpo8hG41BHLEh_7Ahgcdu89AYNvUGPHuEiYY'
);

function rowToTask(row) {
  let meta = {};
  try { meta = JSON.parse(row.notes || '{}'); } catch(e) {}
  return {
    id:           row.id,
    description:  row.name,
    requester:    row.requester || 'other',
    location:     meta.location || 'anywhere',
    mentions:     meta.mentions || 1,
    created:      new Date(row.created_at).getTime(),
    done:         row.completed,
    completedAt:  row.completed_at ? new Date(row.completed_at).getTime() : null,
    snoozed:      meta.snoozed || false,
    snoozedAt:    meta.snoozedAt || null,
    fromEmail:    meta.fromEmail || false,
    brittanyReaction: row.brittany_reaction || null,
    brittanyNote:     row.brittany_note || null,
  };
}

async function loadTasks() {
  const { data, error } = await _sb.from('tasks').select('*').order('created_at', { ascending: true });
  if (error) { console.error('Load error:', error); render(); return; }
  tasks = (data || []).map(rowToTask);
  const weekAgo = Date.now() - 7 * 86400000;
  completedThisWeek = tasks.filter(t => t.done && t.completedAt && t.completedAt > weekAgo).length;
  render();
}

function setupRealtime() {
  _sb.channel('tasks-rt')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, payload => {
      if (payload.eventType === 'INSERT') {
        if (!tasks.find(t => t.id === payload.new.id)) tasks.push(rowToTask(payload.new));
      } else if (payload.eventType === 'UPDATE') {
        const idx = tasks.findIndex(t => t.id === payload.new.id);
        if (idx !== -1) tasks[idx] = rowToTask(payload.new);
        else tasks.push(rowToTask(payload.new));
      } else if (payload.eventType === 'DELETE') {
        tasks = tasks.filter(t => t.id !== payload.old.id);
      }
      const weekAgo = Date.now() - 7 * 86400000;
      completedThisWeek = tasks.filter(t => t.done && t.completedAt && t.completedAt > weekAgo).length;
      render();
    })
    .subscribe();
}

// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
let tasks = [];
let relDates = [];
let completedThisWeek = 0;
let selectedRequester = 'Brittany';
let selectedRelEmoji = '💍';
let weatherData = null;
let currentDetailId = null;

const DURATION_MAP = [
  { words: ['hvac','furnace','ac','air condition','heat pump','boiler'], mins: 15, label: '~15 min (scheduling)' },
  { words: ['faucet','leak','drip','plumb','pipe','toilet','clog','drain'], mins: 45, label: '~45 min' },
  { words: ['oil change','tire','car','vehicle','auto'], mins: 15, label: '~15 min (scheduling)' },
  { words: ['grocery','groceries','shop','restock','snack','food'], mins: 45, label: '~45 min' },
  { words: ['call','phone','schedule','appoint','book'], mins: 10, label: '~10 min' },
  { words: ['email','text','message','send'], mins: 5, label: '~5 min' },
  { words: ['garage','attic','basement','cleanout','clean out'], mins: 120, label: '~1–2 hrs' },
  { words: ['paint','repaint','wall'], mins: 180, label: '~3 hrs' },
  { words: ['mow','lawn','garden','yard','landscap'], mins: 60, label: '~1 hr' },
  { words: ['clean','vacuum','sweep','mop','dust'], mins: 30, label: '~30 min' },
  { words: ['research','look into','find','compare'], mins: 20, label: '~20 min' },
  { words: ['assemble','build','install','mount','hang'], mins: 60, label: '~1 hr' },
];

function estimateDuration(desc) {
  const lower = desc.toLowerCase();
  for (const entry of DURATION_MAP) {
    if (entry.words.some(w => lower.includes(w))) return { mins: entry.mins, label: entry.label };
  }
  return { mins: 30, label: '~30 min' };
}

function smartActions(desc) {
  const lower = desc.toLowerCase();
  const actions = [];
  if (/hvac|furnace|ac\b|air condition|heat pump|boiler|heating|cooling/.test(lower)) {
    actions.push({ text: 'Found <strong>AirPro HVAC</strong> from your last invoice. Open in 30 min.', cta: 'Call now →', type: 'call' });
    actions.push({ text: 'Their site has online booking. You\'re free Tue 10am–12pm.', cta: 'Book it →', type: 'book' });
  } else if (/faucet|drip|leak|plumb|pipe|toilet/.test(lower)) {
    actions.push({ text: 'Found <strong>Westland Plumbing</strong> in your email from last year.', cta: 'Call →', type: 'call' });
  } else if (/oil change|car service|auto service/.test(lower)) {
    actions.push({ text: 'Quick Lane at Ford Westland has next-day appointments.', cta: 'Book online →', type: 'book' });
  } else if (/pediatric|doctor|dentist|appoint/.test(lower)) {
    actions.push({ text: 'Found Dr. Chen\'s number in your contacts.', cta: 'Call →', type: 'call' });
  } else if (/grocery|groceries|restock/.test(lower)) {
    actions.push({ text: 'Add these items to your Kroger pickup order.', cta: 'Open Kroger →', type: 'link' });
  }
  return actions;
}

function calcRisk(task) {
  let score = 0;
  if (task.requester === 'Brittany') score += 3;
  const daysOld = Math.floor((Date.now() - task.created) / 86400000);
  score += Math.min(daysOld * 0.4, 3);
  score += Math.min((task.mentions - 1) * 1.2, 3);
  if (task.snoozed) score += 0.5;
  score += weatherScoreAdjust(task);
  return Math.min(Math.round(score * 10) / 10, 10);
}

// ─────────────────────────────────────────────
// STORAGE  (relDates stay in localStorage; tasks go to Supabase)
// ─────────────────────────────────────────────
function save() {
  try {
    localStorage.setItem('dtm_rel', JSON.stringify(relDates));
  } catch(e) { console.error('Save failed', e); }
}

function load() {
  try {
    relDates = JSON.parse(localStorage.getItem('dtm_rel') || '[]');
    const hadSeeds = relDates.some(r => r.id === 1 || r.id === 2);
    if (hadSeeds) {
      relDates = relDates.filter(r => r.id !== 1 && r.id !== 2);
      save();
    }
  } catch(e) { relDates = []; }
}

// ─────────────────────────────────────────────
// WEATHER
// ─────────────────────────────────────────────
async function loadWeather() {
  try {
    const r = await fetch('https://wttr.in/Westland+MI?format=j1');
    const d = await r.json();
    const cur = d.current_condition[0];
    weatherData = {
      temp: Math.round(parseInt(cur.temp_F)),
      feelsLike: Math.round(parseInt(cur.FeelsLikeF)),
      description: cur.weatherDesc[0].value,
      profile: deriveWeatherProfile(cur)
    };
    updateContext();
    render();
  } catch(e) {
    weatherData = { temp: null, description: '', feelsLike: null, profile: 'neutral' };
    updateContext();
  }
}

function deriveWeatherProfile(cur) {
  const desc = (cur.weatherDesc[0].value || '').toLowerCase();
  const temp = parseInt(cur.temp_F);
  const feels = parseInt(cur.FeelsLikeF);
  if (desc.includes('storm') || desc.includes('thunder')) return 'storm';
  if (desc.includes('snow') || desc.includes('blizzard') || temp <= 25) return 'snow';
  if (desc.includes('rain') || desc.includes('drizzle') || desc.includes('shower')) return 'rain';
  if (desc.includes('fog') || desc.includes('mist')) return 'fog';
  if (feels >= 90) return 'hot';
  if (feels >= 72 && (desc.includes('clear') || desc.includes('sunny') || desc.includes('partly'))) return 'gorgeous';
  if (desc.includes('cloud') || desc.includes('overcast')) return 'cloudy';
  if (temp <= 35) return 'cold';
  return 'nice';
}

function isOutdoorOk() {
  if (!weatherData || !weatherData.profile) return true;
  return !['storm','snow','rain','fog'].includes(weatherData.profile);
}

function weatherNudge(task) {
  if (!weatherData || !weatherData.profile) return null;
  const loc = (task.location || '').toLowerCase();
  const desc = task.description.toLowerCase();
  const p = weatherData.profile;
  const temp = weatherData.temp;
  const feels = weatherData.feelsLike;
  if (loc === 'outdoors' && !isOutdoorOk()) {
    if (p === 'rain') return '🌧️ Raining today — save this for a dry day';
    if (p === 'storm') return '⛈️ Storm outside — indoor day';
    if (p === 'snow') return '❄️ Snow on the ground — not ideal today';
    if (p === 'cold') return `🥶 ${temp}°F out there — bundle up or wait`;
  }
  if (loc === 'outdoors' && (p === 'gorgeous' || p === 'nice')) {
    return `☀️ ${temp}°F and clear — perfect day for this`;
  }
  if (desc.includes('hvac') || desc.includes('furnace') || desc.includes('heat') || desc.includes('ac') || desc.includes('air condition') || desc.includes('cooling')) {
    if (p === 'hot') return `🌡️ Feels like ${feels}°F — HVAC is urgent right now`;
    if (p === 'cold' || p === 'snow') return `🥶 ${temp}°F outside — heating tasks matter today`;
  }
  if (loc === 'errand' && !isOutdoorOk()) {
    if (p === 'rain') return '🌧️ Raining — grab an umbrella or push to tomorrow';
    if (p === 'snow') return '❄️ Snowy roads — plan extra time';
    if (p === 'storm') return '⛈️ Storm warning — hold errands if you can';
  }
  return null;
}

function weatherScoreAdjust(task) {
  if (!weatherData || !weatherData.profile) return 0;
  const loc = (task.location || '').toLowerCase();
  const desc = task.description.toLowerCase();
  const p = weatherData.profile;
  if (['storm','rain','snow'].includes(p)) {
    if (loc === 'indoors' || loc === 'online') return +1.5;
    if (loc === 'outdoors') return -2.5;
    if (loc === 'errand') return -1;
  }
  if (p === 'gorgeous' || p === 'nice') {
    if (loc === 'outdoors') return +2;
  }
  if (p === 'hot') {
    if (desc.includes('hvac') || desc.includes('ac') || desc.includes('air condition') || desc.includes('cooling')) return +2.5;
  }
  if (p === 'cold' || p === 'snow') {
    if (desc.includes('furnace') || desc.includes('heat') || desc.includes('hvac')) return +2;
  }
  return 0;
}

function updateContext() {
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const day = days[new Date().getDay()];
  let ctx = day;
  if (weatherData && weatherData.temp) {
    const icon = getWeatherEmoji(weatherData.description);
    const feel = weatherData.feelsLike && weatherData.feelsLike !== weatherData.temp
      ? ` (feels ${weatherData.feelsLike}°)` : '';
    ctx += ` · ${icon} ${weatherData.temp}°F${feel}`;
  }
  document.getElementById('top-context').textContent = ctx;
}

function getWeatherEmoji(desc) {
  const d = (desc || '').toLowerCase();
  if (d.includes('storm') || d.includes('thunder')) return '⛈️';
  if (d.includes('snow') || d.includes('blizzard')) return '❄️';
  if (d.includes('rain') || d.includes('drizzle') || d.includes('shower')) return '🌧️';
  if (d.includes('fog') || d.includes('mist')) return '🌫️';
  if (d.includes('overcast')) return '☁️';
  if (d.includes('cloud')) return '⛅';
  if (d.includes('clear') || d.includes('sunny')) return '☀️';
  if (d.includes('partly')) return '⛅';
  return '🌤️';
}

// ─────────────────────────────────────────────
// MOMENTUM
// ─────────────────────────────────────────────
function getMomentumMessage() {
  const active = tasks.filter(t => !t.done);
  const critical = active.filter(t => calcRisk(t) >= 7);
  const done = completedThisWeek;
  const p = weatherData && weatherData.profile;
  const temp = weatherData && weatherData.temp;

  const weatherPrefix = (() => {
    if (!p || p === 'neutral') return '';
    if (p === 'gorgeous') return `${temp}°F and gorgeous outside. `;
    if (p === 'nice') return `Nice day out there. `;
    if (p === 'hot') return `Hot one today at ${temp}°F. `;
    if (p === 'rain') return `Rainy day — perfect for indoor tasks. `;
    if (p === 'snow') return `Snow day. `;
    if (p === 'storm') return `Storm outside — stay in and knock something out. `;
    if (p === 'cold') return `Cold out at ${temp}°F. `;
    return '';
  })();

  if (done === 0 && active.length === 0) return { icon: '✨', msg: 'Your list is clear. <strong>Legend.</strong>' };
  if (done >= 5) return { icon: '🔥', msg: `${weatherPrefix}You've knocked out <strong>${done} tasks this week</strong> — Brittany notices the effort. Keep it rolling.` };
  if (done >= 2) return { icon: '💪', msg: `${weatherPrefix}<strong>${done} tasks done this week.</strong> You're building real momentum. One more today?` };
  if (done === 1) return { icon: '✅', msg: `${weatherPrefix}Got one done already. <strong>Every task is a deposit</strong> in your relationship bank.` };
  if (p === 'gorgeous' || p === 'nice') {
    const outdoorTasks = active.filter(t => (t.location || '').toLowerCase() === 'outdoors');
    if (outdoorTasks.length) return { icon: '☀️', msg: `<strong>Great day for outdoor tasks</strong> — you've got ${outdoorTasks.length} waiting. Strike while the sun's out.` };
  }
  if (p === 'rain' || p === 'storm' || p === 'snow') {
    const indoorTasks = active.filter(t => ['indoors','online'].includes((t.location || '').toLowerCase()));
    if (indoorTasks.length) return { icon: '🏠', msg: `<strong>Good day to tackle indoor tasks</strong> — ${indoorTasks.length} lined up and nowhere to be.` };
  }
  if (critical.length > 0) return { icon: '💛', msg: `${weatherPrefix}Fresh start today. <strong>One focused task</strong> can change the whole vibe at home.` };
  return { icon: '✨', msg: `${weatherPrefix}Your list is looking manageable. <strong>Good time to make a dent.</strong>` };
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render() {
  const activeTasks = tasks.filter(t => !t.done).sort((a,b) => calcRisk(b) - calcRisk(a));
  const doneTasks   = tasks.filter(t => t.done).sort((a,b) => b.completedAt - a.completedAt);
  const critical    = activeTasks.filter(t => calcRisk(t) >= 6);
  const rest        = activeTasks.filter(t => calcRisk(t) < 6);

  document.getElementById('stat-active').textContent   = activeTasks.length;
  document.getElementById('stat-critical').textContent = critical.length;
  document.getElementById('stat-done').textContent     = completedThisWeek;

  const { icon, msg } = getMomentumMessage();
  document.getElementById('momentum-bar').querySelector('.momentum-icon').textContent = icon;
  document.getElementById('momentum-text').innerHTML = msg;

  renderFocusSection(activeTasks[0]);
  renderRelationshipSection();
  renderTaskList(rest, doneTasks);
}

function renderFocusSection(topTask) {
  const el = document.getElementById('focus-section');
  if (!topTask) { el.innerHTML = ''; return; }

  const risk      = calcRisk(topTask);
  const isCritical = risk >= 7;
  const duration  = estimateDuration(topTask.description);
  const actions   = smartActions(topTask.description);
  const daysOld   = Math.floor((Date.now() - topTask.created) / 86400000);
  const wNudge    = weatherNudge(topTask);

  let whyText = '';
  if (topTask.requester === 'Brittany') {
    if (topTask.mentions >= 3) whyText = `Brittany has mentioned this ${topTask.mentions} times — it's on her mind.`;
    else if (daysOld >= 3)    whyText = `This has been waiting ${daysOld} days. Brittany will notice when it's done.`;
    else                      whyText = `Brittany asked for this. Handling it shows you're listening.`;
  } else {
    whyText = `Highest priority right now based on age and conditions today.`;
  }

  const smartHTML = actions.map(a => `
    <div class="smart-block">
      <span class="smart-star">✦</span>
      <span class="smart-text">${a.text}</span>
      <span class="smart-cta" onclick="showToast('Opening...')">${a.cta}</span>
    </div>`).join('');

  el.innerHTML = `
    <div class="section-label">needs your attention</div>
    <div class="focus-card ${isCritical ? '' : 'amber-mode'}">
      <div class="focus-header">
        <span class="focus-header-label">${isCritical ? 'Partnership trust — worth doing today' : 'Up next for you'}</span>
        ${topTask.mentions > 1 ? `<span class="mention-badge">mentioned ${topTask.mentions}×</span>` : ''}
      </div>
      <div class="focus-body">
        <div class="focus-task-title">${escHtml(topTask.description)}</div>
        <div class="focus-why">${whyText}</div>
        <div class="chips-row">
          <span class="chip">${duration.label}</span>
          <span class="chip">${capitalize(topTask.location || 'anywhere')}</span>
          ${daysOld > 0 ? `<span class="chip">${daysOld === 1 ? 'Added yesterday' : `${daysOld} days on the list`}</span>` : ''}
          ${wNudge ? `<span class="chip" style="background:var(--gold-pale);color:#5C420A;border-color:var(--gold-border);">${wNudge}</span>` : ''}
        </div>
        ${smartHTML}
        <div class="focus-btns">
          <button class="btn-done" onclick="completeTask('${topTask.id}', true)">Done ✓</button>
          <button class="btn-snooze" onclick="snoozeTask('${topTask.id}')">Not now</button>
        </div>
      </div>
    </div>`;
}

function renderRelationshipSection() {
  const el  = document.getElementById('relationship-section');
  const now = new Date();
  const upcoming = relDates
    .map(r => {
      const d = new Date(r.date);
      const daysLeft = Math.round((d - now) / 86400000);
      return { ...r, daysLeft };
    })
    .filter(r => r.daysLeft >= 0 && r.daysLeft <= (r.remind || 60))
    .sort((a,b) => a.daysLeft - b.daysLeft);

  if (!upcoming.length) { el.innerHTML = ''; return; }

  const rows = upcoming.map(r => `
    <div class="rel-row">
      <div class="rel-icon">${r.emoji}</div>
      <div class="rel-info">
        <div class="rel-title">${escHtml(r.title)}</div>
        <div class="rel-sub">${formatDate(r.date)} · ${r.daysLeft <= 7 ? '⚡ soon!' : 'start planning now'}</div>
      </div>
      <div class="rel-days">
        <div class="rel-days-num">${r.daysLeft}</div>
        <div class="rel-days-label">days</div>
      </div>
      <div class="rel-delete" onclick="deleteRelDate(${r.id})" title="Remove">×</div>
    </div>`).join('');

  el.innerHTML = `
    <div class="section-label" style="margin-top:24px;">coming up — just for you</div>
    <div class="relationship-card">
      ${rows}
      <button class="rel-add-btn" onclick="openRelModal()">+ Add another date</button>
    </div>`;
}

function renderTaskList(rest, doneTasks) {
  const el     = document.getElementById('task-list-section');
  const doneEl = document.getElementById('completed-section');

  if (!rest.length && !tasks.filter(t => !t.done).length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🎉</div><div class="empty-state-text">Nothing left on the list.<br>Brittany is going to love this.</div></div>`;
    doneEl.innerHTML = '';
    return;
  }

  const todayTasks = rest.filter(t => {
    const d = Math.floor((Date.now() - t.created) / 86400000);
    return d <= 2 || calcRisk(t) >= 4;
  });
  const laterTasks = rest.filter(t => !todayTasks.includes(t));

  let html = '';
  if (todayTasks.length) {
    html += `<div class="group-header"><span class="group-title">the rest of your list</span><span class="group-count">${todayTasks.length} task${todayTasks.length !== 1 ? 's' : ''}</span></div>`;
    html += `<div class="task-list">${todayTasks.map(t => taskCard(t)).join('')}</div>`;
  }
  if (laterTasks.length) {
    html += `<div class="group-header"><span class="group-title">whenever you get to it</span><span class="group-count">${laterTasks.length}</span></div>`;
    html += `<div class="task-list">${laterTasks.map(t => taskCard(t)).join('')}</div>`;
  }
  html += `<div class="add-row" onclick="openAddModal()"><div class="add-circle">+</div>What do you need to take care of?</div>`;
  el.innerHTML = html;

  if (doneTasks.length) {
    const open = localStorage.getItem('dtm_completed_open') === 'true';
    doneEl.innerHTML = `
      <div class="completed-toggle" onclick="toggleCompleted(this)">
        <span class="toggle-arrow ${open ? 'open' : ''}">▶</span>
        <span>${doneTasks.length} completed task${doneTasks.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="completed-list ${open ? 'visible' : ''}">
        ${doneTasks.map(t => taskCard(t, true)).join('')}
      </div>`;
  } else {
    doneEl.innerHTML = '';
  }
}

function taskCard(task, isDone = false) {
  const risk         = calcRisk(task);
  const duration     = estimateDuration(task.description);
  const actions      = smartActions(task.description);
  const hasSmartAction = actions.length > 0;
  const wNudge       = !isDone ? weatherNudge(task) : null;
  const scoreClass   = risk >= 8 ? 'critical' : risk >= 5 ? 'high' : '';
  const checkClass   = isDone ? 'checked' : risk >= 6 ? 'urgent' : hasSmartAction ? 'smart-ready' : '';

  return `
    <div class="task-item ${isDone ? 'done-item' : ''}" id="task-${task.id}">
      <div class="task-check ${checkClass}" onclick="event.stopPropagation(); ${isDone ? `undoTask('${task.id}')` : `completeTask('${task.id}')`}"></div>
      <div class="task-body" onclick="openDetail('${task.id}')">
        <div class="task-title ${isDone ? 'done' : ''}">${escHtml(task.description)}</div>
        <div class="task-chips">
          <span class="task-chip">${duration.label}</span>
          <span class="task-chip">${capitalize(task.location || 'anywhere')}</span>
          ${risk >= 6 && !isDone ? `<span class="task-chip urgent-chip">⚡ Priority</span>` : ''}
          ${hasSmartAction && !isDone ? `<span class="task-chip smart-chip">✦ Smart action ready</span>` : ''}
          ${wNudge ? `<span class="task-chip" style="background:var(--gold-pale);color:#5C420A;border-color:var(--gold-border);">${wNudge}</span>` : ''}
          ${isDone ? `<span class="task-chip">✓ Done</span>` : ''}
        </div>
      </div>
      ${!isDone ? `<div class="task-score ${scoreClass}">${Math.round(risk)}</div>` : ''}
    </div>`;
}

// ─────────────────────────────────────────────
// ACTIONS — all writes go through Supabase
// ─────────────────────────────────────────────
async function completeTask(id, fromFocus = false) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const el = document.getElementById(`task-${id}`);
  if (el && !fromFocus) el.classList.add('completing');

  const finish = async () => {
    const now = new Date().toISOString();
    const { error } = await _sb.from('tasks')
      .update({ completed: true, completed_at: now })
      .eq('id', id);
    if (error) { console.error('Complete error:', error); showToast('❌ Failed to complete task'); return; }
    task.done        = true;
    task.completedAt = Date.now();
    completedThisWeek++;
    render();
    closeDetailModal();
    showToast(task.requester === 'Brittany' ? '✓ Done! Brittany will love this 💛' : '✓ Task complete!');
    showShareModal(id, task.description);
  };

  if (el && !fromFocus) setTimeout(finish, 300);
  else finish();
}

async function undoTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const { error } = await _sb.from('tasks')
    .update({ completed: false, completed_at: null })
    .eq('id', id);
  if (error) { console.error('Undo error:', error); showToast('❌ Failed to undo'); return; }
  task.done        = false;
  task.completedAt = null;
  if (completedThisWeek > 0) completedThisWeek--;
  render();
  showToast('Task moved back to active');
}

async function snoozeTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.snoozed   = true;
  task.snoozedAt = Date.now();
  const meta = JSON.stringify({ location: task.location, mentions: task.mentions, snoozed: true, snoozedAt: task.snoozedAt, fromEmail: task.fromEmail || false });
  const { error } = await _sb.from('tasks').update({ notes: meta }).eq('id', id);
  if (error) console.error('Snooze error:', error);
  render();
  showToast("Snoozed — it'll come back around");
}

async function deleteTask(id) {
  const { error } = await _sb.from('tasks').delete().eq('id', id);
  if (error) { console.error('Delete error:', error); showToast('❌ Failed to remove task'); return; }
  tasks = tasks.filter(t => t.id !== id);
  render();
  closeDetailModal();
  showToast('Task removed');
}

async function submitTask() {
  const desc = document.getElementById('task-description').value.trim();
  if (!desc) { showToast('Describe the task first'); return; }

  const location = document.getElementById('task-location').value;
  const mentions = parseInt(document.getElementById('task-mentions').value);
  const meta     = JSON.stringify({ location, mentions, snoozed: false, fromEmail: false });
  const priority = (mentions >= 3 && selectedRequester === 'Brittany') ? 'marital_risk'
                 : (selectedRequester === 'Brittany' || mentions >= 2) ? 'high'
                 : (selectedRequester === 'self') ? 'low' : 'medium';

  const { data, error } = await _sb.from('tasks').insert({
    name:              desc,
    notes:             meta,
    requester:         selectedRequester,
    priority,
    estimated_minutes: estimateDuration(desc).mins,
    completed:         false,
    completed_at:      null,
  }).select().single();

  if (error) { console.error('Insert error:', error); showToast('❌ Failed to add task'); return; }
  if (!tasks.find(t => t.id === data.id)) tasks.push(rowToTask(data));
  render();
  closeAddModal();
  showToast('Added to your list 👍');
}

    <div class="section-label">inbox — ${pendingGmailTasks.length} task${pendingGmailTasks.length !== 1 ? 's' : ''} found</div>
    <div class="gmail-digest">
      <div class="gmail-digest-header">
        <span class="gmail-digest-title">📬 Gmail digest</span>
        <span class="gmail-digest-meta">${lastScanText}</span>
      </div>
      ${taskRows}
      ${unadded.length > 1 ? `<button class="gmail-add-all" onclick="addAllGmailTasks()">Add all ${unadded.length} tasks to list</button>` : ''}
      <div class="gmail-next-scan">${nextScanText} · <span style="color:var(--blue-action);cursor:pointer" onclick="runGmailScan()">Scan now</span></div>
    </div>`;
}

function getNextScanTimes() {
  const now = new Date();
  const estOffset = isDST(now) ? -4 : -5;
  const estNow = new Date(now.getTime() + (now.getTimezoneOffset() + estOffset * 60) * 60000);
  return [6, 18].map(hour => {
    const t = new Date(estNow);
    t.setHours(hour, 0, 0, 0);
    if (t <= estNow) t.setDate(t.getDate() + 1);
    return new Date(t.getTime() - (now.getTimezoneOffset() + estOffset * 60) * 60000);
  }).sort((a,b) => a - b);
}
function isDST(date) {
  const jan = new Date(date.getFullYear(), 0, 1).getTimezoneOffset();
  const jul = new Date(date.getFullYear(), 6, 1).getTimezoneOffset();
  return date.getTimezoneOffset() < Math.max(jan, jul);
}
function getNextScanText() {
  const next    = getNextScanTimes()[0];
  const diffHrs = Math.round((next - Date.now()) / 3600000);
  const timeStr = next.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  if (diffHrs < 1)  return `Auto-scan in less than an hour (${timeStr} EST)`;
  if (diffHrs === 1) return `Auto-scan in about 1 hour (${timeStr} EST)`;
  return `Next auto-scan at ${timeStr} EST`;
}
function formatTimeAgo(ts) {
  const diffMins = Math.round((Date.now() - ts) / 60000);
  if (diffMins < 1)  return 'just now';
  if (diffMins < 60) return `${diffMins}m ago`;
  const diffHrs = Math.round(diffMins / 60);
  if (diffHrs < 24)  return `${diffHrs}h ago`;
  return `${Math.round(diffHrs / 24)}d ago`;
}
let scanTimer = null;
function scheduleNextScan() {
  if (scanTimer) clearTimeout(scanTimer);
  const next  = getNextScanTimes()[0];
  const delay = next - Date.now();
  if (delay > 0 && delay < 86400000) scanTimer = setTimeout(() => runGmailScan(true), delay);
}

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
load();           // relDates from localStorage
updateContext();
loadWeather();
render();         // initial render with empty tasks
loadTasks();      // async: fetches from Supabase, re-renders on resolve
setupRealtime();
scheduleNextScan();
</script>
</body>
