<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daddy Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy:   #0a1628;
      --navy2:  #0f1f38;
      --navy3:  #132540;
      --navy4:  #162b49;
      --navy5:  #1a3358;

      --gold:   #c9a84c;
      --gold2:  #e8c96a;
      --gold3:  rgba(201,168,76,.18);
      --gold4:  rgba(201,168,76,.07);
      --goldb:  rgba(201,168,76,.32);

      --text:   #e8dcc8;
      --text2:  #b8aa94;
      --text3:  #6e6654;

      --border: #1e3452;
      --borderh:#2a4a70;

      --low:    #22c55e;
      --med:    #eab308;
      --high:   #f97316;
      --risk:   #ef4444;

      --low-d:  rgba(34,197,94,.12);
      --med-d:  rgba(234,179,8,.12);
      --high-d: rgba(249,115,22,.12);
      --risk-d: rgba(239,68,68,.15);

      --r:  14px;
      --rs: 9px;
    }

    body {
      background: var(--navy);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ── Header ── */
    .hdr {
      background: var(--navy2);
      border-bottom: 1px solid var(--border);
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: -.3px;
    }
    .logo-sub { font-size: 11px; color: var(--text3); letter-spacing: .4px; margin-top: 2px; }

    .add-hdr-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--gold);
      border: none;
      color: var(--navy);
      padding: 9px 16px;
      border-radius: var(--rs);
      cursor: pointer;
      font-size: 13px; font-weight: 700;
      letter-spacing: .2px;
      transition: all .18s;
      white-space: nowrap;
    }
    .add-hdr-btn:hover { background: var(--gold2); transform: translateY(-1px); }

    /* ── Momentum Banner ── */
    .momentum {
      background: linear-gradient(135deg, var(--navy3), var(--navy4));
      border-bottom: 1px solid var(--goldb);
      padding: 11px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .momentum-msg {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 14px;
      font-style: italic;
      color: var(--gold);
    }
    .momentum-stats { display: flex; gap: 18px; flex-shrink: 0; }
    .mstat { text-align: center; }
    .mstat-n { font-size: 19px; font-weight: 800; color: var(--gold2); line-height: 1; }
    .mstat-l { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .6px; margin-top: 2px; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: var(--navy2);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 13px 16px;
      cursor: pointer;
      color: var(--text3);
      font-size: 13px; font-weight: 600;
      border-bottom: 2px solid transparent;
      transition: all .18s;
      white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
    }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab:hover:not(.active) { color: var(--text); }
    .tbadge {
      padding: 2px 7px;
      border-radius: 12px;
      font-size: 10px; font-weight: 700;
      background: var(--risk); color: #fff;
    }
    .tbadge.done { background: var(--gold3); color: var(--gold); }

    /* ── Content ── */
    .content { max-width: 680px; margin: 0 auto; padding: 20px 16px; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Section title ── */
    .stitle {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stitle::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Relationship Dates ── */
    .dates-section { margin-bottom: 24px; }
    .dates-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    @media (max-width: 420px) { .dates-grid { grid-template-columns: repeat(2, 1fr); } }
    .dcard {
      background: var(--navy3);
      border: 1px solid var(--border);
      border-radius: var(--rs);
      padding: 13px 10px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .dcard::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--gold);
    }
    .dcard.soon::before { background: var(--risk); }
    .dcard-icon { font-size: 22px; margin-bottom: 6px; }
    .dcard-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .dcard-days { font-family: 'Fraunces', Georgia, serif; font-size: 24px; font-weight: 700; color: var(--gold2); line-height: 1; }
    .dcard.soon .dcard-days { color: var(--risk); }
    .dcard-unit { font-size: 9px; color: var(--text3); margin-top: 3px; }

    /* ── Focus Card ── */
    .focus-wrap { margin-bottom: 22px; }
    .focus-card {
      background: linear-gradient(135deg, var(--navy3) 0%, var(--navy4) 100%);
      border: 1px solid var(--goldb);
      border-radius: var(--r);
      padding: 18px;
      position: relative;
      overflow: hidden;
    }
    .focus-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
    }
    .focus-tag {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--gold);
      margin-bottom: 10px;
    }
    .focus-body { display: flex; align-items: flex-start; gap: 14px; }
    .focus-content { flex: 1; min-width: 0; }
    .focus-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 22px; font-weight: 700; line-height: 1.25;
      color: var(--text);
      margin-bottom: 11px;
    }
    .focus-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 11px; }
    .focus-notes {
      font-size: 12px; color: var(--text2); line-height: 1.5;
      padding: 8px 10px;
      background: rgba(255,255,255,.04);
      border-radius: 6px;
      border-left: 2px solid var(--goldb);
      margin-bottom: 12px;
    }
    .focus-btn {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      background: var(--gold);
      border: none;
      color: var(--navy);
      padding: 11px 20px;
      border-radius: var(--rs);
      cursor: pointer;
      font-size: 13px; font-weight: 700;
      width: 100%;
      transition: all .18s;
      font-family: 'Fraunces', Georgia, serif;
      letter-spacing: .2px;
    }
    .focus-btn:hover { background: var(--gold2); transform: translateY(-1px); }
    .focus-risk {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      flex-shrink: 0;
    }
    .focus-ring {
      width: 58px; height: 58px;
      border-radius: 50%;
      border: 2px solid;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .focus-ring-n { font-size: 24px; font-weight: 900; line-height: 1; font-family: 'Fraunces', Georgia, serif; }
    .focus-ring-l { font-size: 8px; text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; color: var(--text3); }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    @media (max-width: 400px) { .stats { grid-template-columns: repeat(2, 1fr); } }
    .stat {
      background: var(--navy3);
      border: 1px solid var(--border);
      border-radius: var(--rs);
      padding: 12px 10px;
      text-align: center;
    }
    .stat-n { font-family: 'Fraunces', Georgia, serif; font-size: 26px; font-weight: 800; line-height: 1; }
    .stat-l { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }

    /* ── Add button ── */
    .add-btn {
      width: 100%;
      padding: 13px;
      background: transparent;
      border: 2px dashed var(--border);
      border-radius: var(--r);
      color: var(--text3);
      cursor: pointer;
      font-size: 14px; font-weight: 500;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 18px;
      transition: all .18s;
    }
    .add-btn:hover { border-color: var(--goldb); color: var(--gold); background: var(--gold4); }

    /* ── Task list ── */
    .tlist { display: flex; flex-direction: column; gap: 10px; }

    /* ── Task card ── */
    .tcard {
      background: var(--navy3);
      border: 1px solid var(--border);
      border-left: 3px solid var(--text3);
      border-radius: var(--r);
      padding: 14px 14px 12px;
      transition: border-color .18s, background .18s;
      animation: fadeIn .25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .tcard:hover { background: var(--navy4); border-color: var(--borderh); }
    .tcard.p-low          { border-left-color: var(--low); }
    .tcard.p-medium       { border-left-color: var(--med); }
    .tcard.p-high         { border-left-color: var(--high); }
    .tcard.p-marital_risk { border-left-color: var(--risk); }
    .tcard.done { opacity: .5; border-left-color: var(--text3) !important; }
    .tcard.done .tname { text-decoration: line-through; color: var(--text3); }

    .thead { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 9px; }
    .tname { font-size: 15px; font-weight: 600; line-height: 1.35; flex: 1; }

    .risk-wrap { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
    .risk-ring {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 2px solid;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .risk-n { font-family: 'Fraunces', Georgia, serif; font-size: 17px; font-weight: 900; line-height: 1; }
    .risk-l { font-size: 8px; text-transform: uppercase; letter-spacing: .5px; color: var(--text3); margin-top: 1px; }

    .tmeta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .badge {
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px; font-weight: 600;
      border: 1px solid transparent;
    }
    .b-req  { background: var(--gold4); color: var(--gold); border-color: var(--goldb); }
    .b-days { background: rgba(255,255,255,.04); color: var(--text3); border-color: var(--border); }
    .b-time { background: rgba(78,205,196,.08); color: #4ecdc4; border-color: rgba(78,205,196,.15); }
    .b-p-low          { background: var(--low-d);  color: var(--low);  border-color: rgba(34,197,94,.25); }
    .b-p-medium       { background: var(--med-d);  color: var(--med);  border-color: rgba(234,179,8,.25); }
    .b-p-high         { background: var(--high-d); color: var(--high); border-color: rgba(249,115,22,.25); }
    .b-p-marital_risk { background: var(--risk-d); color: var(--risk); border-color: rgba(239,68,68,.3); }
    .b-done { background: rgba(255,255,255,.04); color: var(--text3); border-color: var(--border); }

    .tnotes {
      font-size: 12px; color: var(--text2); line-height: 1.5;
      margin-bottom: 10px;
      padding: 8px 10px;
      background: rgba(255,255,255,.03);
      border-radius: 6px;
      border-left: 2px solid var(--border);
    }

    .tfoot { display: flex; justify-content: flex-end; }
    .done-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--low-d);
      border: 1px solid rgba(34,197,94,.3);
      color: var(--low);
      padding: 7px 14px;
      border-radius: var(--rs);
      cursor: pointer;
      font-size: 12px; font-weight: 600;
      transition: all .18s;
    }
    .done-btn:hover { background: rgba(34,197,94,.22); }

    /* ── Brittany reaction ── */
    .b-reaction {
      display: flex; align-items: flex-start; gap: 8px;
      margin-top: 8px; padding: 8px 10px;
      background: rgba(255,182,193,.07);
      border: 1px solid rgba(255,182,193,.18);
      border-radius: 8px;
    }
    .b-reaction-emoji { font-size: 18px; line-height: 1.1; flex-shrink: 0; }
    .b-reaction-body { flex: 1; }
    .b-reaction-label { font-size: 10px; color: #ffb6c1; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
    .b-reaction-note { font-size: 12px; color: #f0c4cf; line-height: 1.45; font-style: italic; }

    /* ── Empty ── */
    .empty { text-align: center; padding: 56px 20px; color: var(--text3); }
    .empty-icon { font-size: 44px; margin-bottom: 14px; }
    .empty h3 { font-family: 'Fraunces', Georgia, serif; font-size: 18px; color: var(--gold); margin-bottom: 6px; }
    .empty p  { font-size: 13px; }

    /* ── Quick Match ── */
    .qm-title { font-family: 'Fraunces', Georgia, serif; font-size: 22px; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
    .qm-sub   { font-size: 13px; color: var(--text3); margin-bottom: 18px; }
    .time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 22px; }
    @media (max-width: 380px) { .time-grid { grid-template-columns: repeat(2, 1fr); } }
    .tbtn {
      padding: 13px 6px;
      background: var(--navy3);
      border: 2px solid var(--border);
      border-radius: var(--rs);
      color: var(--text3);
      cursor: pointer;
      font-size: 12px; font-weight: 600;
      text-align: center;
      transition: all .18s;
    }
    .tbtn .t-icon { font-size: 20px; margin-bottom: 5px; }
    .tbtn:hover       { border-color: var(--borderh); color: var(--text); }
    .tbtn.active      { background: var(--gold4); border-color: var(--goldb); color: var(--gold); }

    /* ── Overlay / Modal ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.8);
      z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--navy2);
      border: 1px solid var(--border);
      border-radius: var(--r) var(--r) 0 0;
      width: 100%; max-width: 680px;
      padding: 22px 18px 30px;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      max-height: 92vh;
      overflow-y: auto;
    }
    .overlay.open .modal { transform: translateY(0); }
    @media (min-width: 680px) {
      .overlay { align-items: center; }
      .modal { border-radius: var(--r); transform: translateY(24px) scale(.97); max-height: 88vh; }
      .overlay.open .modal { transform: translateY(0) scale(1); }
    }
    .mhdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .mtitle { font-family: 'Fraunces', Georgia, serif; font-size: 20px; font-weight: 700; color: var(--gold); }
    .xbtn {
      background: var(--navy3);
      border: 1px solid var(--border);
      color: var(--text3);
      width: 30px; height: 30px;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      transition: all .18s;
    }
    .xbtn:hover { color: var(--text); border-color: var(--borderh); }

    /* Form */
    .fg { margin-bottom: 14px; }
    .fl {
      display: block;
      font-size: 11px; font-weight: 700;
      color: var(--text3);
      text-transform: uppercase; letter-spacing: .8px;
      margin-bottom: 6px;
    }
    input[type=text], textarea, select {
      width: 100%;
      background: var(--navy3);
      border: 1px solid var(--border);
      border-radius: var(--rs);
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color .18s;
      font-family: inherit;
    }
    input[type=text]:focus, textarea:focus, select:focus { border-color: var(--goldb); }
    input[type=text]::placeholder, textarea::placeholder { color: var(--text3); }
    textarea { resize: vertical; min-height: 74px; }
    select option { background: var(--navy3); }
    .pg { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .po {
      padding: 10px 4px;
      background: var(--navy3);
      border: 2px solid var(--border);
      border-radius: var(--rs);
      cursor: pointer;
      text-align: center;
      font-size: 11px; font-weight: 700;
      line-height: 1.3;
      transition: all .18s;
      text-transform: uppercase; letter-spacing: .3px;
    }
    .po[data-p=low]          { color: var(--low); }
    .po[data-p=medium]       { color: var(--med); }
    .po[data-p=high]         { color: var(--high); }
    .po[data-p=marital_risk] { color: var(--risk); }
    .po.sel[data-p=low]          { background: var(--low-d);  border-color: var(--low); }
    .po.sel[data-p=medium]       { background: var(--med-d);  border-color: var(--med); }
    .po.sel[data-p=high]         { background: var(--high-d); border-color: var(--high); }
    .po.sel[data-p=marital_risk] { background: var(--risk-d); border-color: var(--risk); }

    .submit {
      width: 100%;
      padding: 13px;
      background: var(--gold);
      border: none;
      border-radius: var(--rs);
      color: var(--navy);
      font-size: 14px; font-weight: 700;
      cursor: pointer;
      margin-top: 18px;
      transition: all .18s;
      font-family: 'Fraunces', Georgia, serif;
      letter-spacing: .2px;
    }
    .submit:hover  { background: var(--gold2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(201,168,76,.3); }
    .submit:active { transform: translateY(0); box-shadow: none; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--navy3);
      border: 1px solid var(--goldb);
      border-radius: var(--rs);
      padding: 10px 18px;
      font-size: 13px; font-weight: 500;
      z-index: 400;
      transition: transform .28s cubic-bezier(.4,0,.2,1), opacity .28s;
      opacity: 0;
      white-space: nowrap;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
      color: var(--gold);
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── Share modal ── */
    .share-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.8);
      z-index: 300;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    .share-overlay.open { opacity: 1; pointer-events: all; }
    .share-modal {
      background: var(--navy2);
      border: 1px solid var(--goldb);
      border-radius: var(--r);
      width: 100%; max-width: 420px;
      padding: 22px 20px 24px;
      transform: scale(.95);
      transition: transform .25s cubic-bezier(.4,0,.2,1);
    }
    .share-overlay.open .share-modal { transform: scale(1); }
    .share-title { font-family: 'Fraunces', Georgia, serif; font-size: 20px; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
    .share-task-name {
      font-size: 13px; color: var(--text2);
      margin-bottom: 14px; line-height: 1.4;
      padding: 8px 10px;
      background: var(--navy3);
      border-radius: 6px;
      border-left: 2px solid var(--goldb);
    }
    .share-sub { font-size: 13px; color: var(--text3); margin-bottom: 12px; }
    .share-link-row {
      display: flex; gap: 8px; align-items: center;
      background: var(--navy3); border: 1px solid var(--border);
      border-radius: var(--rs); padding: 10px 12px;
      margin-bottom: 12px;
    }
    .share-link-text {
      flex: 1; font-size: 11px; color: var(--text3);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-family: monospace;
    }
    .copy-btn {
      background: var(--gold); border: none; color: var(--navy);
      padding: 6px 14px; border-radius: 6px;
      cursor: pointer; font-size: 12px; font-weight: 700;
      flex-shrink: 0; transition: opacity .15s;
    }
    .copy-btn:hover { opacity: .85; }
    .share-close {
      width: 100%; padding: 11px; background: transparent;
      border: 1px solid var(--border); border-radius: var(--rs);
      color: var(--text3); cursor: pointer;
      font-size: 13px; font-weight: 500; transition: all .15s;
    }
    .share-close:hover { color: var(--text); border-color: var(--borderh); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--navy); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Date add button in grid ── */
    .dcard-add {
      background: transparent;
      border: 2px dashed var(--border);
      border-radius: var(--rs);
      padding: 13px 10px;
      text-align: center;
      cursor: pointer;
      color: var(--text3);
      font-size: 12px; font-weight: 600;
      transition: all .18s;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px;
      min-height: 94px;
    }
    .dcard-add:hover { border-color: var(--goldb); color: var(--gold); background: var(--gold4); }
    .dcard-add-plus { font-size: 22px; line-height: 1; }

    .dcard-del {
      position: absolute; top: 4px; right: 4px;
      background: rgba(0,0,0,.45); border: none;
      color: var(--text3); width: 18px; height: 18px;
      border-radius: 50%; cursor: pointer;
      font-size: 9px;
      display: none; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .dcard:hover .dcard-del { display: flex; }
    .dcard-del:hover { color: var(--risk); background: rgba(239,68,68,.25); }

    /* Completing animation */
    .completing { animation: completing .35s ease forwards; }
    @keyframes completing {
      0%  { transform: scale(1); opacity: 1; }
      40% { transform: scale(1.02); }
      100%{ transform: scale(.96); opacity: 0; height: 0; padding: 0; margin: 0; overflow: hidden; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="hdr">

    Add Task

<!-- ── MOMENTUM BANNER ── -->
<div class="momentum">

</div>

<!-- ── TABS ── -->
<nav class="tabs">

<!-- ── OPEN TASKS PANEL ── -->
<div id="panel-tasks" class="panel active">
  <div class="content">

    <!-- Relationship Dates -->

<!-- ── QUICK MATCH PANEL ── -->
<div id="panel-quick" class="panel">

    <div class="qm-title">What can I do right now?</div>

    <div class="time-grid">
      <button class="tbtn" data-min="15" onclick="pickTime(this)">

      <button class="tbtn" data-min="30" onclick="pickTime(this)">

      <button class="tbtn" data-min="60" onclick="pickTime(this)">

<!-- ── DONE PANEL ── -->

  <div class="content">

  </div>

<!-- ── ADD TASK MODAL ── -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="mhdr">
      <div class="mtitle">New Task</div>
      <button class="xbtn" onclick="closeModal()">✕</button>
    </div>
    <div class="fg">
      <label class="fl">Task Name <span style="color:var(--risk)">*</span></label>
      <input type="text" id="f-name" placeholder="What needs to get done?" />
    </div>
    <div class="fg">
      <label class="fl">Notes</label>
      <textarea id="f-notes" placeholder="Any extra context or details…"></textarea>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
      <div class="fg" style="margin-bottom:0">
        <label class="fl">Requested By</label>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<!-- ── ADD DATE MODAL ── -->
<div class="overlay" id="date-overlay" onclick="dateOverlayClick(event)">
  <div class="modal">
    <div class="mhdr">
      <div class="mtitle">Add Important Date</div>
      <button class="xbtn" onclick="closeDateModal()">✕</button>
    </div>
    <div class="fg">
      <label class="fl">Emoji Icon</label>
      <input type="text" id="fd-icon" placeholder="💍" maxlength="4" style="font-size:20px; text-align:center;" />
    </div>
    <div class="fg">
      <label class="fl">Label <span style="color:var(--risk)">*</span></label>
      <input type="text" id="fd-label" placeholder="Anniversary" />
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">

        <label class="fl">Month</label>

          <option value="1">January</option>
          <option value="2">February</option>
          <option value="3">March</option>
          <option value="4">April</option>
          <option value="5">May</option>

          <option value="7">July</option>

<!-- ── SHARE MODAL ── -->
<div class="share-overlay" id="share-overlay" onclick="shareOverlayClick(event)">
  <div class="share-modal">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ── Supabase ───────────────────────────────────────────────────────────
  const _sb = supabase.createClient(
    'https://lcghspaeauqyssrkhizu.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjZ2hzcGFlYXVxeXNzcmtoaXp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNTY0ODksImV4cCI6MjA5MjczMjQ4OX0._D6C8MpPpo8hG41BHLEh_7Ahgcdu89AYNvUGPHuEiYY'
  );

  // ── Relationship dates (persisted to localStorage) ────────────────────
  let relDates = JSON.parse(localStorage.getItem('rel_dates') || '[]');

  function renderDates() {
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    const cards = relDates.map((d, i) => {
      let target = new Date(now.getFullYear(), d.month - 1, d.day);
      if (target < now) target = new Date(now.getFullYear() + 1, d.month - 1, d.day);
      const days = Math.round((target - now) / 86400000);
      const cls  = days <= 14 ? 'soon' : '';
      return `
        <div class="dcard ${cls}">
          <button class="dcard-del" onclick="removeDate(${i})" title="Remove">✕</button>
          <div class="dcard-icon">${esc(d.icon)}</div>
          <div class="dcard-label">${esc(d.label)}</div>
          <div class="dcard-days">${days}</div>
          <div class="dcard-unit">days away</div>
        </div>`;
    }).join('');
    const addBtn = `
      <button class="dcard-add" onclick="openDateModal()">
        <div class="dcard-add-plus">+</div>
        Add a date
      </button>`;
    document.getElementById('dates-grid').innerHTML = cards + addBtn;
  }

  function openDateModal() {
    document.getElementById('date-overlay').classList.add('open');
    setTimeout(() => document.getElementById('fd-label').focus(), 300);
  }
  function closeDateModal() { document.getElementById('date-overlay').classList.remove('open'); }
  function dateOverlayClick(e) { if (e.target === document.getElementById('date-overlay')) closeDateModal(); }

  function saveDate() {
    const label = document.getElementById('fd-label').value.trim();
    const day   = Number(document.getElementById('fd-day').value);
    if (!label || !day || day < 1 || day > 31) {
      const el = !label ? document.getElementById('fd-label') : document.getElementById('fd-day');
      el.style.borderColor = 'var(--risk)';
      el.focus();
      setTimeout(() => el.style.borderColor = '', 1800);
      return;
    }
    relDates.push({
      icon:  document.getElementById('fd-icon').value.trim() || '📅',
      label,
      month: Number(document.getElementById('fd-month').value),
      day,
    });
    localStorage.setItem('rel_dates', JSON.stringify(relDates));
    renderDates();
    closeDateModal();
    document.getElementById('fd-icon').value  = '';
    document.getElementById('fd-label').value = '';
    document.getElementById('fd-month').value = '1';
    document.getElementById('fd-day').value   = '';
  }

  function removeDate(i) {
    relDates.splice(i, 1);
    localStorage.setItem('rel_dates', JSON.stringify(relDates));
    renderDates();
  }

  // ── State ──────────────────────────────────────────────────────────────
  let tasks = [];
  let activePriority = 'medium';
  let activeTime = null;

  const PRIORITY_RANK  = { marital_risk: 4, high: 3, medium: 2, low: 1 };
  const PRIORITY_LABEL = { low: 'Low', medium: 'Medium', high: 'High', marital_risk: '⚠️ Marital Risk' };
  const TIME_LABEL     = { 15: '15 min', 30: '30 min', 60: '1 hour', 120: '2 hours', 180: '3+ hours' };

  function rowToTask(row) {
    return {
      id:                row.id,
      name:              row.name,
      notes:             row.notes || '',
      requester:         row.requester,
      priority:          row.priority,
      estimatedTime:     row.estimated_minutes,
      createdAt:         new Date(row.created_at).getTime(),
      completed:         row.completed,
      completedAt:       row.completed_at ? new Date(row.completed_at).getTime() : null,
      brittanyReaction:  row.brittany_reaction || null,
      brittanyNote:      row.brittany_note || null,
      brittanyReactedAt: row.brittany_reacted_at ? new Date(row.brittany_reacted_at).getTime() : null,
    };
  }

  async function loadTasks() {
    const { data, error } = await _sb.from('tasks').select('*').order('created_at', { ascending: true });
    if (error) { console.error('Load error:', error); return; }
    tasks = (data || []).map(rowToTask);
    render();
  }

  function setupRealtime() {
    _sb.channel('tasks-rt')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, payload => {
        if (payload.eventType === 'INSERT') {
          if (!tasks.find(t => t.id === payload.new.id)) tasks.push(rowToTask(payload.new));
        } else if (payload.eventType === 'UPDATE') {
          const idx = tasks.findIndex(t => t.id === payload.new.id);
          if (idx !== -1) tasks[idx] = rowToTask(payload.new);
          else tasks.push(rowToTask(payload.new));
        } else if (payload.eventType === 'DELETE') {
          tasks = tasks.filter(t => t.id !== payload.old.id);
        }
        render();
      })
      .subscribe();
  }

  // ── Utilities ──────────────────────────────────────────────────────────
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function daysAgoLabel(ts) {
    const d = Math.floor((Date.now() - ts) / 86400000);
    if (d === 0) return 'Today';
    if (d === 1) return '1 day ago';
    return `${d} days ago`;
  }

  function sortOpen(list) {
    return [...list].sort((a, b) => {
      const pd = (PRIORITY_RANK[b.priority] || 0) - (PRIORITY_RANK[a.priority] || 0);
      return pd !== 0 ? pd : b.createdAt - a.createdAt;
    });
  }

  function risk(t) {
    const base     = { low: 1, medium: 3, high: 5, marital_risk: 8 }[t.priority] || 1;
    const mult     = /wife/i.test(t.requester) ? 1.5 : 1;
    const days     = Math.floor((Date.now() - t.createdAt) / 86400000);
    const dayBonus = Math.min(days * 0.5, 4.5);
    return Math.min(10, Math.round(base * mult + dayBonus));
  }

  function riskColor(n) {
    if (n <= 2) return '#22c55e';
    if (n <= 4) return '#a3e635';
    if (n <= 6) return '#eab308';
    if (n <= 8) return '#f97316';
    return '#ef4444';
  }

  // ── Focus Card ─────────────────────────────────────────────────────────
  function renderFocusCard(open) {
    const wrap = document.getElementById('focus-wrap');
    if (!open.length) { wrap.innerHTML = ''; return; }
    const t  = open[0];
    const r  = risk(t);
    const rc = riskColor(r);
    wrap.innerHTML = `
      <div class="stitle">🎯 Focus On This</div>
      <div class="focus-card">
        <div class="focus-tag">Top Priority Task</div>
        <div class="focus-body">
          <div class="focus-content">
            <div class="focus-title">${esc(t.name)}</div>
            <div class="focus-meta">
              <span class="badge b-req">${esc(t.requester)}</span>
              <span class="badge b-days">${daysAgoLabel(t.createdAt)}</span>
              <span class="badge b-time">🕐 ${TIME_LABEL[t.estimatedTime] || t.estimatedTime + ' min'}</span>
              <span class="badge b-p-${t.priority}">${PRIORITY_LABEL[t.priority]}</span>
            </div>
            ${t.notes ? `<div class="focus-notes">${esc(t.notes)}</div>` : ''}
            <button class="focus-btn" onclick="completeTask('${t.id}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              Mark Complete
            </button>
          </div>
          <div class="focus-risk">
            <div class="focus-ring" style="border-color:${rc}; color:${rc}">
              <div class="focus-ring-n">${r}</div>
              <div class="focus-ring-l">risk</div>
            </div>
          </div>
        </div>
      </div>`;
  }

  // ── Momentum Banner ────────────────────────────────────────────────────
  function renderMomentum(open, done) {
    const weekAgo  = Date.now() - 7 * 86400000;
    const thisWeek = done.filter(t => t.completedAt && t.completedAt > weekAgo).length;
    const mrCount  = open.filter(t => t.priority === 'marital_risk').length;

    let msg;
    if (mrCount > 0)       msg = `⚠️ ${mrCount} marital risk task${mrCount > 1 ? 's' : ''} — do not sleep on this`;
    else if (open.length === 0) msg = 'All clear — she\'s happy 💛';
    else if (thisWeek >= 5)    msg = 'You\'re crushing it this week! 💪';
    else if (thisWeek > 0)    msg = `${thisWeek} task${thisWeek > 1 ? 's' : ''} done this week — keep going`;
    else                      msg = 'Stay on top of it, champ.';

    document.getElementById('momentum-msg').textContent = msg;
    document.getElementById('momentum-stats').innerHTML = [
      { n: thisWeek,   l: 'This Week' },
      { n: open.length, l: 'Remaining' },
    ].map(s => `
      <div class="mstat">
        <div class="mstat-n">${s.n}</div>
        <div class="mstat-l">${s.l}</div>
      </div>`).join('');
  }

  // ── Card HTML ──────────────────────────────────────────────────────────
  function cardHTML(t, opts = {}) {
    const { showRisk = true, showComplete = true } = opts;
    const r  = risk(t);
    const rc = riskColor(r);
    return `
    <div class="tcard p-${t.priority}${t.completed ? ' done' : ''}" id="card-${t.id}">
      <div class="thead">
        <div class="tname">${esc(t.name)}</div>
        ${showRisk ? `
        <div class="risk-wrap">
          <div class="risk-ring" style="border-color:${rc}; color:${rc}">
            <div class="risk-n">${r}</div>
            <div class="risk-l">risk</div>
          </div>
        </div>` : ''}
      </div>
      <div class="tmeta">
        <span class="badge b-req">${esc(t.requester)}</span>
        <span class="badge b-days">${daysAgoLabel(t.createdAt)}</span>
        <span class="badge b-time">🕐 ${TIME_LABEL[t.estimatedTime] || t.estimatedTime + ' min'}</span>
        <span class="badge b-p-${t.priority}">${PRIORITY_LABEL[t.priority] || t.priority}</span>
        ${t.completed ? `<span class="badge b-done">✓ Done ${daysAgoLabel(t.completedAt)}</span>` : ''}
      </div>
      ${t.notes ? `<div class="tnotes">${esc(t.notes)}</div>` : ''}
      ${t.completed && t.brittanyReaction ? `
      <div class="b-reaction">
        <div class="b-reaction-emoji">${esc(t.brittanyReaction)}</div>
        <div class="b-reaction-body">
          <div class="b-reaction-label">Brittany reacted</div>
          ${t.brittanyNote ? `<div class="b-reaction-note">${esc(t.brittanyNote)}</div>` : ''}
        </div>
      </div>` : ''}
      ${showComplete && !t.completed ? `
      <div class="tfoot">
        <button class="done-btn" onclick="completeTask('${t.id}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Mark Complete
        </button>
      </div>` : ''}
    </div>`;
  }

  // ── Render ─────────────────────────────────────────────────────────────
  function render() {
    const open = sortOpen(tasks.filter(t => !t.completed));
    const done = tasks.filter(t => t.completed).sort((a, b) => b.completedAt - a.completedAt);

    // Tab badges
    const highRisk = open.filter(t => risk(t) >= 8).length;
    const bo = document.getElementById('badge-open');
    const bd = document.getElementById('badge-done');
    if (open.length) {
      bo.style.display = '';
      bo.textContent = open.length;
      bo.style.background = highRisk ? 'var(--risk)' : 'var(--gold)';
      bo.style.color = highRisk ? '#fff' : 'var(--navy)';
    } else {
      bo.style.display = 'none';
    }
    if (done.length) { bd.style.display = ''; bd.textContent = done.length; }
    else             { bd.style.display = 'none'; }

    renderMomentum(open, done);
    renderFocusCard(open);

    // Stats
    document.getElementById('stats').innerHTML = [
      { n: open.length,                                              l: 'Open',         c: 'var(--gold)' },
      { n: open.filter(t => t.priority === 'marital_risk').length,  l: 'Marital Risk', c: 'var(--risk)' },
      { n: open.filter(t => t.priority === 'high').length,          l: 'High',         c: 'var(--high)' },
      { n: done.length,                                              l: 'Completed',    c: 'var(--low)'  },
    ].map(s => `
      <div class="stat">
        <div class="stat-n" style="color:${s.c}">${s.n}</div>
        <div class="stat-l">${s.l}</div>
      </div>`).join('');

    // Remaining tasks (skip focus card task)
    const remaining = open.slice(1);
    const rl = document.getElementById('remaining-label');
    const el = document.getElementById('tlist-open');

    if (!open.length) {
      rl.innerHTML = '';
      el.innerHTML = `
        <div class="empty">
          <div class="empty-icon">🎉</div>
          <h3>All caught up!</h3>
          <p>No open tasks. Add one above to get started.</p>
        </div>`;
    } else if (remaining.length) {
      rl.innerHTML = '<div class="stitle" style="margin-bottom:12px">📋 Remaining Tasks</div>';
      el.innerHTML = remaining.map(t => cardHTML(t)).join('');
    } else {
      rl.innerHTML = '';
      el.innerHTML = '';
    }

    // Done list
    const dl = document.getElementById('tlist-done');
    dl.innerHTML = done.length
      ? done.map(t => cardHTML(t, { showRisk: false, showComplete: false })).join('')
      : `<div class="empty">
           <div class="empty-icon">📋</div>
           <h3>Nothing completed yet</h3>
           <p>Finished tasks will appear here.</p>
         </div>`;

    if (activeTime !== null) renderQuick(activeTime);
  }

  function renderQuick(minutes) {
    const fits   = { 15: [15], 30: [15,30], 60: [15,30,60], 9999: [15,30,60,120,180] };
    const allowed = fits[minutes] || [];
    const open   = sortOpen(tasks.filter(t => !t.completed));
    const matched = open.filter(t => allowed.includes(Number(t.estimatedTime)));
    document.getElementById('tlist-quick').innerHTML = matched.length
      ? matched.map(t => cardHTML(t)).join('')
      : `<div class="empty">
           <div class="empty-icon">🔍</div>
           <h3>No matching tasks</h3>
           <p>No open tasks fit in this time window.</p>
         </div>`;
  }

  // ── Tab switching ──────────────────────────────────────────────────────
  function switchTab(id) {
    ['tasks','quick','done'].forEach(t => {
      document.getElementById(`tab-${t}`).classList.toggle('active', t === id);
      document.getElementById(`panel-${t}`).classList.toggle('active', t === id);
    });
  }

  function pickTime(btn) {
    document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTime = Number(btn.dataset.min);
    renderQuick(activeTime);
  }

  // ── Modal ──────────────────────────────────────────────────────────────
  function openModal() {
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('f-name').focus(), 300);
  }
  function closeModal() { document.getElementById('overlay').classList.remove('open'); }
  function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

  function selPriority(p) {
    activePriority = p;
    document.querySelectorAll('.po').forEach(el =>
      el.classList.toggle('sel', el.dataset.p === p));
  }

  // ── Add task ───────────────────────────────────────────────────────────
  async function addTask() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) {
      const el = document.getElementById('f-name');
      el.style.borderColor = 'var(--risk)';
      el.focus();
      setTimeout(() => el.style.borderColor = '', 1800);
      return;
    }
    const { data, error } = await _sb.from('tasks').insert({
      name,
      notes:             document.getElementById('f-notes').value.trim(),
      requester:         document.getElementById('f-req').value.trim() || 'Wife',
      priority:          activePriority,
      estimated_minutes: Number(document.getElementById('f-time').value),
      completed:         false,
      completed_at:      null,
    }).select().single();
    if (error) { console.error('Insert error:', error); toast('❌ Failed to add task'); return; }
    if (!tasks.find(t => t.id === data.id)) tasks.push(rowToTask(data));
    render();
    closeModal();
    resetForm();
    toast('✓ Task added');
  }

  function resetForm() {
    document.getElementById('f-name').value  = '';
    document.getElementById('f-notes').value = '';
    document.getElementById('f-req').value   = 'Wife';
    document.getElementById('f-time').value  = '60';
    selPriority('medium');
  }

  // ── Complete task ──────────────────────────────────────────────────────
  function completeTask(id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    const card = document.getElementById('card-' + id);
    const finish = async () => {
      const now = new Date().toISOString();
      const { error } = await _sb.from('tasks')
        .update({ completed: true, completed_at: now })
        .eq('id', id);
      if (error) { console.error('Update error:', error); toast('❌ Failed to complete task'); return; }
      t.completed   = true;
      t.completedAt = Date.now();
      render();
      showShareModal(id, t.name);
    };
    if (card) {
      card.classList.add('completing');
      card.addEventListener('animationend', finish, { once: true });
    } else {
      finish();
    }
    toast('🎉 Task complete!');
  }

  // ── Toast ──────────────────────────────────────────────────────────────
  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
  }

  // ── Share modal ────────────────────────────────────────────────────────
  let _shareLink = '';
  function showShareModal(taskId, taskName) {
    _shareLink = `https://dewaradam.github.io/household-os/brittany.html?task=${taskId}`;
    document.getElementById('share-task-name').textContent = taskName;
    document.getElementById('share-link-text').textContent = _shareLink;
    document.getElementById('share-overlay').classList.add('open');
  }
  function closeShareModal() { document.getElementById('share-overlay').classList.remove('open'); }
  function shareOverlayClick(e) {
    if (e.target === document.getElementById('share-overlay')) closeShareModal();
  }
  function copyLink() {
    navigator.clipboard.writeText(_shareLink).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
    });
  }

  // ── Keyboard shortcuts ─────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeShareModal(); closeDateModal(); }
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openModal(); }
    if (e.key === 'Enter' && document.activeElement.id === 'f-name') addTask();
  });

  // ── Init ───────────────────────────────────────────────────────────────
  renderDates();
  loadTasks();
  setupRealtime();
</script>
</body>
</html>
