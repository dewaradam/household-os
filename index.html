<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Daddy Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0F1F35;
      --navy-mid: #1A2F48;
      --navy-light: #243A57;
      --gold: #C49A2A;
      --gold-light: #E8C55A;
      --gold-pale: #FDF6E3;
      --gold-border: rgba(196,154,42,0.3);
      --blue-action: #2E86AB;
      --blue-light: #E3F2F9;
      --blue-border: rgba(46,134,171,0.3);
      --red: #E24B4A;
      --red-light: #FCEBEB;
      --red-border: rgba(226,75,74,0.35);
      --teal: #1D9E75;
      --teal-light: #E1F5EE;
      --amber: #D4880A;
      --amber-light: #FEF3DC;
      --rose: #C96B7A;
      --rose-light: #F7E8EB;
      --rose-border: rgba(201,107,122,0.25);
      --page-bg: #F4F6F9;
      --card-bg: #FFFFFF;
      --text-primary: #1A1A2E;
      --text-secondary: #5A6478;
      --text-tertiary: #8E97A8;
      --border: rgba(0,0,0,0.08);
      --border-mid: rgba(0,0,0,0.12);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--page-bg);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .topbar {
      background: var(--navy);
      padding: 20px 20px 18px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-inner { max-width: 600px; margin: 0 auto; display: flex; align-items: flex-start; justify-content: space-between; }
    .topbar-context { font-size: 12px; color: var(--gold-light); font-weight: 300; letter-spacing: 0.03em; margin-bottom: 3px; }
    .topbar-title { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 500; color: #fff; line-height: 1.1; }
    .topbar-actions { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 50%;
      border: 1px solid rgba(196,154,42,0.4);
      background: rgba(196,154,42,0.1);
      color: var(--gold-light);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px; line-height: 1;
      transition: background 0.15s, border-color 0.15s;
    }
    .icon-btn:hover { background: rgba(196,154,42,0.2); border-color: rgba(196,154,42,0.6); }

    .momentum {
      max-width: 600px; margin: 0 auto;
      background: var(--navy-mid);
      border-bottom: 1px solid var(--gold-border);
      padding: 12px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .momentum-icon { font-size: 20px; flex-shrink: 0; }
    .momentum-text { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.5; }
    .momentum-text strong { color: var(--gold-light); font-weight: 500; }

    .main { max-width: 600px; margin: 0 auto; padding: 20px 16px 120px; }

    .section-label {
      font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-tertiary);
      padding: 0 4px; margin-bottom: 10px; margin-top: 24px;
    }
    .section-label:first-child { margin-top: 0; }

    /* Focus card */
    .focus-card {
      background: var(--card-bg);
      border: 1.5px solid var(--red);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 6px;
    }
    .focus-card.amber-mode { border-color: var(--amber); }
    .focus-header {
      background: var(--red-light);
      padding: 8px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .focus-card.amber-mode .focus-header { background: var(--amber-light); }
    .focus-header-label { font-size: 11px; font-weight: 500; color: #7A1F1F; }
    .focus-card.amber-mode .focus-header-label { color: #7A4A05; }
    .mention-badge {
      font-size: 10px; font-weight: 500;
      background: rgba(226,75,74,0.2); color: #7A1F1F;
      border-radius: 20px; padding: 2px 8px;
    }
    .focus-card.amber-mode .mention-badge { background: rgba(212,136,10,0.2); color: #7A4A05; }
    .focus-body { padding: 14px 14px 12px; }
    .focus-task-title {
      font-family: 'Fraunces', serif;
      font-size: 17px; font-weight: 500; line-height: 1.3;
      color: var(--text-primary); margin-bottom: 5px;
    }
    .focus-why { font-size: 12px; color: #A32D2D; margin-bottom: 10px; line-height: 1.4; }
    .focus-card.amber-mode .focus-why { color: #8C5006; }
    .chips-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
    .chip {
      font-size: 11px; padding: 3px 9px; border-radius: 20px;
      background: var(--page-bg); color: var(--text-secondary);
      border: 0.5px solid var(--border-mid);
    }
    .smart-block {
      background: var(--blue-light);
      border: 0.5px solid var(--blue-border);
      border-radius: var(--radius-sm);
      padding: 9px 11px;
      margin-bottom: 8px;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .smart-block:last-of-type { margin-bottom: 12px; }
    .smart-star { font-size: 13px; flex-shrink: 0; color: var(--blue-action); margin-top: 1px; }
    .smart-text { font-size: 12px; color: #1A4A62; line-height: 1.4; flex: 1; }
    .smart-text strong { font-weight: 500; }
    .smart-cta { font-size: 12px; font-weight: 500; color: var(--blue-action); white-space: nowrap; cursor: pointer; margin-top: 1px; flex-shrink: 0; }
    .smart-cta:hover { text-decoration: underline; }
    .focus-btns { display: flex; gap: 8px; }
    .btn-done {
      flex: 1; padding: 10px 14px;
      border-radius: var(--radius-sm); border: none;
      background: var(--red); color: #fff;
      font-size: 13px; font-weight: 500; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.15s;
    }
    .focus-card.amber-mode .btn-done { background: var(--amber); }
    .btn-done:hover { opacity: 0.88; }
    .btn-snooze {
      padding: 10px 14px; border-radius: var(--radius-sm);
      border: 0.5px solid var(--border-mid); background: transparent;
      color: var(--text-secondary); font-size: 13px; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s;
    }
    .btn-snooze:hover { background: var(--page-bg); }

    /* Brittany flag */
    .brittany-flag {
      background: var(--rose-light);
      border: 0.5px solid var(--rose-border);
      border-radius: var(--radius-sm);
      padding: 8px 11px;
      margin-bottom: 10px;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .brittany-flag-text { font-size: 12px; color: #6B2535; line-height: 1.4; flex: 1; }
    .brittany-flag-text strong { font-weight: 500; }

    /* Relationship card */
    .relationship-card {
      background: var(--gold-pale);
      border: 0.5px solid var(--gold-border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin-bottom: 6px;
    }
    .rel-row { display: flex; align-items: center; gap: 12px; padding: 6px 0; }
    .rel-row + .rel-row { border-top: 0.5px solid rgba(196,154,42,0.2); }
    .rel-icon { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; }
    .rel-info { flex: 1; min-width: 0; }
    .rel-title { font-size: 13px; font-weight: 500; color: #5C420A; margin-bottom: 1px; }
    .rel-sub { font-size: 11px; color: #8A6015; }
    .rel-days { text-align: right; flex-shrink: 0; }
    .rel-days-num { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; color: #5C420A; line-height: 1; }
    .rel-days-label { font-size: 10px; color: #8A6015; }
    .rel-add-btn {
      width: 100%; margin-top: 10px; padding: 7px;
      border: 0.5px dashed rgba(196,154,42,0.5);
      border-radius: var(--radius-sm); background: transparent;
      color: var(--gold); font-size: 12px; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s;
    }
    .rel-add-btn:hover { background: rgba(196,154,42,0.08); }

    /* Task list */
    .task-list { display: flex; flex-direction: column; gap: 1px; }
    .task-item {
      background: var(--card-bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 11px 13px;
      display: flex; align-items: flex-start; gap: 10px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .task-item:hover { border-color: var(--border-mid); }
    .task-item:active { transform: scale(0.995); }
    .task-item.completing { opacity: 0.4; transform: scale(0.98); transition: all 0.3s; }
    .task-item.has-flag { border-color: var(--rose); border-width: 1.5px; }

    .task-flag-banner {
      margin-top: 6px;
      background: var(--rose-light);
      border: 0.5px solid var(--rose-border);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      font-size: 11px; font-weight: 500;
      color: #6B2535;
      display: flex; align-items: center; gap: 6px;
      width: 100%;
    }

    .task-check {
      width: 19px; height: 19px; border-radius: 50%;
      border: 1.5px solid var(--border-mid);
      flex-shrink: 0; margin-top: 1px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      background: transparent;
    }
    .task-check:hover { border-color: var(--teal); }
    .task-check.checked { background: var(--teal); border-color: var(--teal); }
    .task-check.checked::after { content: '\2713'; font-size: 11px; color: #fff; font-weight: 500; }
    .task-check.urgent { border-color: var(--amber); }
    .task-check.smart-ready { border-color: var(--blue-action); }

    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 13px; line-height: 1.4; margin-bottom: 4px; color: var(--text-primary); }
    .task-title.done { text-decoration: line-through; color: var(--text-tertiary); }
    .task-chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .task-chip {
      font-size: 10px; padding: 2px 7px; border-radius: 20px;
      background: var(--page-bg); color: var(--text-tertiary);
      border: 0.5px solid var(--border);
    }
    .task-chip.smart-chip { background: var(--blue-light); color: #1A4A62; border-color: var(--blue-border); }
    .task-chip.urgent-chip { background: var(--amber-light); color: #7A4A05; border-color: rgba(212,136,10,0.3); }
    .task-chip.flag-chip { background: var(--rose-light); color: #6B2535; border-color: var(--rose-border); }

    .task-score {
      font-family: 'Fraunces', serif;
      font-size: 14px; font-weight: 500;
      color: var(--text-tertiary); flex-shrink: 0; margin-top: 1px;
    }
    .task-score.high { color: var(--amber); }
    .task-score.critical { color: var(--red); }

    /* Completed section */
    .completed-toggle {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 4px; cursor: pointer; color: var(--text-tertiary);
      font-size: 12px; user-select: none;
    }
    .completed-toggle:hover { color: var(--text-secondary); }
    .toggle-arrow { font-size: 10px; transition: transform 0.2s; }
    .toggle-arrow.open { transform: rotate(90deg); }
    .completed-list { display: none; }
    .completed-list.visible { display: flex; flex-direction: column; gap: 1px; }
    .task-item.done-item { opacity: 0.55; }
    .task-item.done-item:hover { opacity: 0.75; }

    /* Brittany reaction on completed */
    .reaction-bubble {
      margin-top: 6px;
      background: var(--rose-light);
      border: 0.5px solid var(--rose-border);
      border-radius: var(--radius-sm);
      padding: 5px 9px;
      font-size: 11px; color: #6B2535;
      display: inline-flex; align-items: center; gap: 5px;
    }

    /* Group header */
    .group-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 4px 8px;
    }
    .group-title { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
    .group-count { font-size: 11px; color: var(--text-tertiary); }

    /* Add row */
    .add-row {
      background: var(--card-bg);
      border: 0.5px dashed var(--border-mid);
      border-radius: var(--radius-md);
      padding: 11px 13px;
      display: flex; align-items: center; gap: 10px;
      color: var(--text-tertiary); font-size: 13px; cursor: pointer;
      margin-top: 2px;
      transition: border-color 0.15s, color 0.15s;
    }
    .add-row:hover { border-color: var(--gold-border); color: var(--gold); }
    .add-circle {
      width: 19px; height: 19px; border-radius: 50%;
      border: 1.5px solid var(--border-mid);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; line-height: 1; flex-shrink: 0;
      transition: border-color 0.15s;
    }
    .add-row:hover .add-circle { border-color: var(--gold); }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 4px; }
    .stat-card {
      background: var(--navy); border-radius: var(--radius-md);
      padding: 12px 14px;
    }
    .stat-num {
      font-family: 'Fraunces', serif;
      font-size: 26px; font-weight: 500; color: #fff; line-height: 1; margin-bottom: 3px;
    }
    .stat-num.gold { color: var(--gold-light); }
    .stat-num.red { color: #F09595; }
    .stat-label { font-size: 11px; color: rgba(255,255,255,0.45); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(10,15,25,0.65);
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: var(--card-bg);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      width: 100%; max-width: 600px;
      padding: 24px 20px 36px;
      animation: slideUp 0.22s ease-out;
      max-height: 90vh;
      overflow-y: auto;
    }
    @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-handle { width: 36px; height: 4px; background: var(--border-mid); border-radius: 2px; margin: 0 auto 20px; }
    .modal-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 500; margin-bottom: 20px; }

    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; display: block; }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 10px 12px;
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-sm); background: var(--page-bg);
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      color: var(--text-primary); outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold); }
    .form-textarea { resize: vertical; min-height: 70px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .requester-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .requester-btn {
      flex: 1; padding: 8px; border-radius: var(--radius-sm);
      border: 0.5px solid var(--border-mid); background: transparent;
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      color: var(--text-secondary); cursor: pointer;
      transition: all 0.15s;
    }
    .requester-btn.selected { background: var(--navy); color: var(--gold-light); border-color: var(--navy); }

    .btn-submit {
      width: 100%; padding: 12px;
      background: var(--navy); color: var(--gold-light);
      border: none; border-radius: var(--radius-md);
      font-family: 'Fraunces', serif; font-size: 16px; font-weight: 500;
      cursor: pointer; transition: opacity 0.15s;
      margin-top: 8px;
    }
    .btn-submit:hover { opacity: 0.88; }
    .btn-submit:disabled { opacity: 0.5; cursor: default; }
    .btn-cancel {
      width: 100%; padding: 10px;
      background: transparent; color: var(--text-tertiary);
      border: none; font-family: 'DM Sans', sans-serif; font-size: 13px;
      cursor: pointer; margin-top: 6px;
    }

    .rel-type-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
    .rel-type-btn {
      padding: 6px 12px; border-radius: 20px;
      border: 0.5px solid var(--border-mid); background: transparent;
      font-family: 'DM Sans', sans-serif; font-size: 12px;
      color: var(--text-secondary); cursor: pointer;
      transition: all 0.15s;
    }
    .rel-type-btn.selected { background: var(--gold-pale); border-color: var(--gold-border); color: #5C420A; }

    /* Detail modal extras */
    .detail-chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0; }
    .detail-chip {
      font-size: 12px; padding: 4px 10px; border-radius: 20px;
      background: var(--page-bg); border: 0.5px solid var(--border-mid);
      color: var(--text-secondary);
    }
    .detail-smart-block {
      background: var(--blue-light); border: 0.5px solid var(--blue-border);
      border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px;
    }
    .detail-smart-label { font-size: 10px; font-weight: 500; color: var(--blue-action); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .detail-smart-text { font-size: 13px; color: #1A4A62; line-height: 1.4; }
    .detail-smart-action {
      display: inline-block; margin-top: 6px;
      font-size: 12px; font-weight: 500; color: var(--blue-action);
      cursor: pointer; border: none; background: transparent;
      font-family: 'DM Sans', sans-serif; padding: 0;
    }
    .detail-actions { display: flex; gap: 8px; margin-top: 16px; }
    .btn-detail-done {
      flex: 1; padding: 11px;
      background: var(--navy); color: var(--gold-light);
      border: none; border-radius: var(--radius-md);
      font-family: 'Fraunces', serif; font-size: 15px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-detail-done:hover { opacity: 0.88; }
    .btn-detail-delete {
      padding: 11px 16px; border-radius: var(--radius-md);
      border: 0.5px solid var(--red-border); background: transparent;
      color: var(--red); font-size: 13px; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    /* Brittany needs info block in detail */
    .detail-flag-block {
      background: var(--rose-light);
      border: 1px solid var(--rose-border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      margin-bottom: 12px;
    }
    .detail-flag-label {
      font-size: 11px; font-weight: 500; color: var(--rose);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px;
    }
    .detail-flag-text { font-size: 13px; color: #6B2535; margin-bottom: 10px; line-height: 1.4; }
    .detail-reply-input {
      width: 100%; padding: 8px 10px;
      border: 0.5px solid var(--rose-border);
      border-radius: var(--radius-sm);
      background: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: var(--text-primary);
      outline: none; resize: none; min-height: 52px;
      transition: border-color 0.15s;
    }
    .detail-reply-input:focus { border-color: var(--rose); }
    .btn-reply {
      margin-top: 8px; padding: 8px 16px;
      background: var(--rose); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      font-weight: 500; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-reply:hover { opacity: 0.88; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--navy); color: #fff;
      padding: 10px 18px; border-radius: 30px;
      font-size: 13px; z-index: 300;
      border: 1px solid var(--gold-border);
      transition: transform 0.25s ease-out, opacity 0.25s;
      opacity: 0; pointer-events: none; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Empty state */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-tertiary); }
    .empty-state-icon { font-size: 32px; margin-bottom: 12px; }
    .empty-state-text { font-size: 14px; line-height: 1.5; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }
  </style>
</head>
<body>

<div id="topbar-wrap" style="background:var(--navy);">
  <div class="topbar" style="padding-bottom:14px;">
    <div class="topbar-inner">
      <div>
        <div class="topbar-context" id="top-context">Loading...</div>
        <div class="topbar-title">Hey Adam 👋</div>
      </div>
      <div class="topbar-actions">
        <div class="icon-btn" onclick="openRelModal()" title="Add date to remember">📅</div>
        <div class="icon-btn" onclick="openAddModal()" title="Add task">+</div>
      </div>
    </div>
  </div>
  <div class="momentum" id="momentum-bar">
    <div class="momentum-icon">✨</div>

<script>
// =============================================
// SUPABASE
// =============================================
const SUPABASE_URL = 'https://lcghspaeauqyssrkhizu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxjZ2hzcGFlYXVxeXNzcmtoaXp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNTY0ODksImV4cCI6MjA5MjczMjQ4OX0._D6C8MpPpo8hG41BHLEh_7Ahgcdu89AYNvUGPHuEiYY';

async function sbFetch(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...(opts.headers || {}),
    },
    method: opts.method || 'GET',
    body: opts.body || undefined,
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error('Supabase error: ' + err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// =============================================
// STATE
// =============================================
let tasks = [];
let relDates = [];
let weatherData = null;
let selectedRequester = 'Brittany';
let selectedRelEmoji = '💍';
let currentDetailId = null;

// =============================================
// DURATION + SMART ACTIONS
// =============================================
const DURATION_MAP = [
  { words: ['hvac','furnace','ac','air condition','heat pump','boiler'], mins: 15, label: '~15 min (scheduling)' },
  { words: ['faucet','leak','drip','plumb','pipe','toilet','clog','drain'], mins: 45, label: '~45 min' },
  { words: ['oil change','tire','car','vehicle','auto'], mins: 15, label: '~15 min (scheduling)' },
  { words: ['grocery','groceries','shop','restock','snack','food'], mins: 45, label: '~45 min' },
  { words: ['call','phone','schedule','appoint','book'], mins: 10, label: '~10 min' },
  { words: ['email','text','message','send'], mins: 5, label: '~5 min' },
  { words: ['garage','attic','basement','cleanout','clean out'], mins: 120, label: '~1-2 hrs' },
  { words: ['paint','repaint','wall'], mins: 180, label: '~3 hrs' },
  { words: ['mow','lawn','garden','yard','landscap'], mins: 60, label: '~1 hr' },
  { words: ['clean','vacuum','sweep','mop','dust'], mins: 30, label: '~30 min' },
  { words: ['research','look into','find','compare'], mins: 20, label: '~20 min' },
  { words: ['assemble','build','install','mount','hang'], mins: 60, label: '~1 hr' },
];

function estimateDuration(desc) {
  const lower = (desc || '').toLowerCase();
  for (const entry of DURATION_MAP) {
    if (entry.words.some(function(w) { return lower.includes(w); })) {
      return { mins: entry.mins, label: entry.label };
    }
  }
  return { mins: 30, label: '~30 min' };
}

function smartActions(desc) {
  const lower = (desc || '').toLowerCase();
  const actions = [];
  if (/hvac|furnace|ac\b|air condition|heat pump|boiler|heating|cooling/.test(lower)) {
    actions.push({ text: 'Found <strong>AirPro HVAC</strong> from your last invoice. Open in 30 min.', cta: 'Call now', type: 'call' });
  } else if (/faucet|drip|leak|plumb|pipe|toilet/.test(lower)) {
    actions.push({ text: 'Found <strong>Westland Plumbing</strong> in your email from last year.', cta: 'Call', type: 'call' });
  } else if (/oil change|car service|auto service/.test(lower)) {
    actions.push({ text: 'Quick Lane at Ford Westland has next-day appointments.', cta: 'Book online', type: 'book' });
  } else if (/grocery|groceries|restock/.test(lower)) {
    actions.push({ text: 'Add these items to your Kroger pickup order.', cta: 'Open Kroger', type: 'link' });
  }
  return actions;
}

// =============================================
// RISK SCORING
// =============================================
function calcRisk(task) {
  var score = 0;
  if (task.requester === 'Brittany' || task.requester === 'Wife') score += 3;
  var created = task.created_at ? new Date(task.created_at).getTime() : Date.now();
  var daysOld = Math.floor((Date.now() - created) / 86400000);
  score += Math.min(daysOld * 0.4, 3);
  var mentions = (task.notes && task.notes.mentions) ? parseInt(task.notes.mentions) : 1;
  score += Math.min((mentions - 1) * 1.2, 3);
  var snoozed = task.notes && task.notes.snoozed;
  if (snoozed) score += 0.5;
  // Priority boost
  var p = task.priority;
  if (p === 'critical') score += 3;
  else if (p === 'high') score += 2;
  else if (p === 'low') score -= 1;
  score += weatherScoreAdjust(task);
  return Math.min(Math.round(score * 10) / 10, 10);
}

// =============================================
// WEATHER
// =============================================
async function loadWeather() {
  try {
    var r = await fetch('https://wttr.in/Westland+MI?format=j1');
    var d = await r.json();
    var cur = d.current_condition[0];
    weatherData = {
      temp: Math.round(parseInt(cur.temp_F)),
      feelsLike: Math.round(parseInt(cur.FeelsLikeF)),
      description: cur.weatherDesc[0].value,
      profile: deriveWeatherProfile(cur)
    };
    updateContext();
    render();
  } catch(e) {
    weatherData = { temp: null, description: '', feelsLike: null, profile: 'neutral' };
    updateContext();
  }
}

function deriveWeatherProfile(cur) {
  var desc = (cur.weatherDesc[0].value || '').toLowerCase();
  var temp = parseInt(cur.temp_F);
  var feels = parseInt(cur.FeelsLikeF);
  if (desc.includes('storm') || desc.includes('thunder')) return 'storm';
  if (desc.includes('snow') || desc.includes('blizzard') || temp <= 25) return 'snow';
  if (desc.includes('rain') || desc.includes('drizzle') || desc.includes('shower')) return 'rain';
  if (desc.includes('fog') || desc.includes('mist')) return 'fog';
  if (feels >= 90) return 'hot';
  if (feels >= 72 && (desc.includes('clear') || desc.includes('sunny') || desc.includes('partly'))) return 'gorgeous';
  if (desc.includes('cloud') || desc.includes('overcast')) return 'cloudy';
  if (temp <= 35) return 'cold';
  return 'nice';
}

function isOutdoorOk() {
  if (!weatherData || !weatherData.profile) return true;
  return !['storm','snow','rain','fog'].includes(weatherData.profile);
}

function weatherNudge(task) {
  if (!weatherData || !weatherData.profile) return null;
  var loc = ((task.notes && task.notes.location) || '').toLowerCase();
  var desc = (task.name || '').toLowerCase();
  var p = weatherData.profile;
  var temp = weatherData.temp;
  var feels = weatherData.feelsLike;
  if (loc === 'outdoors' && !isOutdoorOk()) {
    if (p === 'rain') return 'Raining today -- save for a dry day';
    if (p === 'storm') return 'Storm outside -- indoor day';
    if (p === 'snow') return 'Snow on the ground -- not ideal today';
    if (p === 'cold') return temp + 'F out there -- bundle up or wait';
  }
  if (loc === 'outdoors' && (p === 'gorgeous' || p === 'nice')) {
    return temp + 'F and clear -- perfect day for this';
  }
  if (/hvac|furnace|heat|ac|air condition|cooling/.test(desc)) {
    if (p === 'hot') return 'Feels like ' + feels + 'F -- HVAC is urgent right now';
    if (p === 'cold' || p === 'snow') return temp + 'F outside -- heating tasks matter today';
  }
  if (loc === 'errand' && !isOutdoorOk()) {
    if (p === 'rain') return 'Raining -- grab an umbrella';
    if (p === 'snow') return 'Snowy roads -- plan extra time';
  }
  return null;
}

function weatherScoreAdjust(task) {
  if (!weatherData || !weatherData.profile) return 0;
  var loc = ((task.notes && task.notes.location) || '').toLowerCase();
  var desc = (task.name || '').toLowerCase();
  var p = weatherData.profile;
  if (['storm','rain','snow'].includes(p)) {
    if (loc === 'indoors' || loc === 'online') return 1.5;
    if (loc === 'outdoors') return -2.5;
    if (loc === 'errand') return -1;
  }
  if (p === 'gorgeous' || p === 'nice') {
    if (loc === 'outdoors') return 2;
  }
  if (p === 'hot') {
    if (/hvac|ac|air condition|cooling/.test(desc)) return 2.5;
  }
  if (p === 'cold' || p === 'snow') {
    if (/furnace|heat|hvac/.test(desc)) return 2;
  }
  return 0;
}

function updateContext() {
  var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var day = days[new Date().getDay()];
  var ctx = day;
  if (weatherData && weatherData.temp) {
    var icon = getWeatherEmoji(weatherData.description);
    var feel = (weatherData.feelsLike && weatherData.feelsLike !== weatherData.temp)
      ? ' (feels ' + weatherData.feelsLike + 'F)' : '';
    ctx += ' - ' + icon + ' ' + weatherData.temp + 'F' + feel;
  }
  document.getElementById('top-context').textContent = ctx;
}

function getWeatherEmoji(desc) {
  var d = (desc || '').toLowerCase();
  if (d.includes('storm') || d.includes('thunder')) return 'Storm';
  if (d.includes('snow') || d.includes('blizzard')) return 'Snow';
  if (d.includes('rain') || d.includes('drizzle') || d.includes('shower')) return 'Rain';
  if (d.includes('fog') || d.includes('mist')) return 'Fog';
  if (d.includes('overcast')) return 'Cloudy';
  if (d.includes('cloud')) return 'P.Cloudy';
  if (d.includes('clear') || d.includes('sunny')) return 'Sunny';
  return 'Clear';
}

// =============================================
// LOAD FROM SUPABASE
// =============================================
async function loadTasks() {
  try {
    var data = await sbFetch('tasks?select=*&order=created_at.asc');
    tasks = data || [];
    render();
  } catch(e) {
    console.error('Load error', e);
    showToast('Could not load tasks -- check connection');
  }
}

// =============================================
// COMPUTED VALUES
// =============================================
function getActiveTasks() {
  return tasks
    .filter(function(t) { return !t.completed; })
    .sort(function(a, b) { return calcRisk(b) - calcRisk(a); });
}

function getDoneTasks() {
  return tasks
    .filter(function(t) { return t.completed; })
    .sort(function(a, b) { return new Date(b.completed_at || 0) - new Date(a.completed_at || 0); });
}

function getCompletedThisWeek() {
  var weekAgo = Date.now() - (7 * 86400000);
  return tasks.filter(function(t) {
    return t.completed && t.completed_at && new Date(t.completed_at).getTime() > weekAgo;
  }).length;
}

// =============================================
// MOMENTUM
// =============================================
function getMomentumMessage() {
  var active = getActiveTasks();
  var done = getCompletedThisWeek();
  var p = weatherData && weatherData.profile;
  var temp = weatherData && weatherData.temp;

  var weatherPrefix = '';
  if (p && p !== 'neutral') {
    if (p === 'gorgeous') weatherPrefix = temp + 'F and gorgeous outside. ';
    else if (p === 'nice') weatherPrefix = 'Nice day out there. ';
    else if (p === 'hot') weatherPrefix = 'Hot one today at ' + temp + 'F. ';
    else if (p === 'rain') weatherPrefix = 'Rainy day -- perfect for indoor tasks. ';
    else if (p === 'snow') weatherPrefix = 'Snow day. ';
    else if (p === 'storm') weatherPrefix = 'Storm outside -- stay in and knock something out. ';
    else if (p === 'cold') weatherPrefix = 'Cold out at ' + temp + 'F. ';
  }

  if (done === 0 && active.length === 0) return { icon: '✨', msg: 'Your list is clear. <strong>Legend.</strong>' };
  if (done >= 5) return { icon: '🔥', msg: weatherPrefix + 'You\'ve knocked out <strong>' + done + ' tasks this week</strong> -- Brittany notices. Keep it rolling.' };
  if (done >= 2) return { icon: '💪', msg: weatherPrefix + '<strong>' + done + ' tasks done this week.</strong> You\'re building real momentum. One more today?' };
  if (done === 1) return { icon: '✅', msg: weatherPrefix + 'Got one done already. <strong>Every task is a deposit</strong> in your relationship bank.' };

  var outdoorTasks = active.filter(function(t) { return ((t.notes && t.notes.location) || '').toLowerCase() === 'outdoors'; });
  if ((p === 'gorgeous' || p === 'nice') && outdoorTasks.length) {
    return { icon: '☀️', msg: '<strong>Great day for outdoor tasks</strong> -- you\'ve got ' + outdoorTasks.length + ' waiting.' };
  }
  var indoorTasks = active.filter(function(t) { return ['indoors','online'].includes(((t.notes && t.notes.location) || '').toLowerCase()); });
  if ((p === 'rain' || p === 'storm' || p === 'snow') && indoorTasks.length) {
    return { icon: '🏠', msg: '<strong>Good day to tackle indoor tasks</strong> -- ' + indoorTasks.length + ' lined up.' };
  }
  return { icon: '✨', msg: weatherPrefix + 'Your list is looking manageable. <strong>Good time to make a dent.</strong>' };
}

// =============================================
// RENDER
// =============================================
function render() {
  var activeTasks = getActiveTasks();
  var doneTasks = getDoneTasks();
  var critical = activeTasks.filter(function(t) { return calcRisk(t) >= 6; });
  var rest = activeTasks.slice(1); // everything except focus card task -- no tasks fall through
  var doneCount = getCompletedThisWeek();

  document.getElementById('stat-active').textContent = activeTasks.length;
  document.getElementById('stat-critical').textContent = critical.length;
  document.getElementById('stat-done').textContent = doneCount;

  var m = getMomentumMessage();
  document.getElementById('momentum-bar').querySelector('.momentum-icon').textContent = m.icon;
  document.getElementById('momentum-text').innerHTML = m.msg;

  renderFocusSection(activeTasks[0]);
  renderRelationshipSection();
  renderTaskList(rest, doneTasks);
}

function renderFocusSection(topTask) {
  var el = document.getElementById('focus-section');
  if (!topTask) { el.innerHTML = ''; return; }

  var risk = calcRisk(topTask);
  var isCritical = risk >= 7;
  var duration = estimateDuration(topTask.name);
  var actions = smartActions(topTask.name);
  var created = topTask.created_at ? new Date(topTask.created_at).getTime() : Date.now();
  var daysOld = Math.floor((Date.now() - created) / 86400000);
  var wNudge = weatherNudge(topTask);
  var mentions = (topTask.notes && topTask.notes.mentions) ? parseInt(topTask.notes.mentions) : 1;
  var hasFlag = topTask.notes && topTask.notes.needs_discussion;
  var brittanyNote = topTask.notes && topTask.notes.brittany_note;

  var whyText = '';
  if (topTask.requester === 'Brittany' || topTask.requester === 'Wife') {
    if (mentions >= 3) whyText = 'Brittany has mentioned this ' + mentions + ' times -- it\'s on her mind.';
    else if (daysOld >= 3) whyText = 'This has been waiting ' + daysOld + ' days. Brittany will notice when it\'s done.';
    else whyText = 'Brittany asked for this. Handling it shows you\'re listening.';
  } else {
    whyText = 'Highest priority right now based on age and conditions today.';
  }

  var flagHTML = hasFlag ? '<div class="brittany-flag"><span>💬</span><div class="brittany-flag-text"><strong>Brittany wants to discuss this</strong>' + (brittanyNote ? ' -- ' + escHtml(brittanyNote) : '') + '</div></div>' : '';

  var smartHTML = actions.map(function(a) {
    return '<div class="smart-block"><span class="smart-star">*</span><span class="smart-text">' + a.text + '</span><span class="smart-cta" onclick="showToast(\'Opening...\')">' + a.cta + '</span></div>';
  }).join('');

  el.innerHTML = '<div class="section-label">needs your attention</div>' +
    '<div class="focus-card ' + (isCritical ? '' : 'amber-mode') + '">' +
    '<div class="focus-header">' +
    '<span class="focus-header-label">' + (isCritical ? 'Partnership trust -- worth doing today' : 'Up next for you') + '</span>' +
    (mentions > 1 ? '<span class="mention-badge">mentioned ' + mentions + 'x</span>' : '') +
    '</div>' +
    '<div class="focus-body">' +
    '<div class="focus-task-title">' + escHtml(topTask.name || '') + '</div>' +
    '<div class="focus-why">' + whyText + '</div>' +
    flagHTML +
    '<div class="chips-row">' +
    '<span class="chip">' + duration.label + '</span>' +
    '<span class="chip">' + capitalize((topTask.notes && topTask.notes.location) || 'anywhere') + '</span>' +
    (daysOld > 0 ? '<span class="chip">' + (daysOld === 1 ? 'Added yesterday' : daysOld + ' days on the list') + '</span>' : '') +
    (wNudge ? '<span class="chip" style="background:var(--gold-pale);color:#5C420A;border-color:var(--gold-border);">' + wNudge + '</span>' : '') +
    '</div>' +
    smartHTML +
    '<div class="focus-btns">' +
    '<button class="btn-done" onclick="completeTask(\'' + topTask.id + '\', true)">Done ✓</button>' +
    '<button class="btn-snooze" onclick="snoozeTask(\'' + topTask.id + '\')">Not now</button>' +
    '</div>' +
    '</div></div>';
}

function renderRelationshipSection() {
  var el = document.getElementById('relationship-section');
  var now = new Date();
  var upcoming = relDates
    .map(function(r) {
      var d = new Date(r.date);
      var daysLeft = Math.round((d - now) / 86400000);
      return Object.assign({}, r, { daysLeft: daysLeft });
    })
    .filter(function(r) { return r.daysLeft >= 0 && r.daysLeft <= (r.remind || 60); })
    .sort(function(a, b) { return a.daysLeft - b.daysLeft; });

  if (!upcoming.length) { el.innerHTML = ''; return; }

  var rows = upcoming.map(function(r) {
    return '<div class="rel-row">' +
      '<div class="rel-icon">' + r.emoji + '</div>' +
      '<div class="rel-info">' +
      '<div class="rel-title">' + escHtml(r.title) + '</div>' +
      '<div class="rel-sub">' + formatDate(r.date) + ' - ' + (r.daysLeft <= 7 ? 'soon!' : 'start planning now') + '</div>' +
      '</div>' +
      '<div class="rel-days"><div class="rel-days-num">' + r.daysLeft + '</div><div class="rel-days-label">days</div></div>' +
      '</div>';
  }).join('');

  el.innerHTML = '<div class="section-label" style="margin-top:24px;">coming up -- just for you</div>' +
    '<div class="relationship-card">' + rows +
    '<button class="rel-add-btn" onclick="openRelModal()">+ Add another date</button>' +
    '</div>';
}

function renderTaskList(rest, doneTasks) {
  var el = document.getElementById('task-list-section');
  var doneEl = document.getElementById('completed-section');
  var activeTasks = getActiveTasks();

  if (!activeTasks.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🎉</div><div class="empty-state-text">Nothing left on the list.<br>Brittany is going to love this.</div></div>';
    doneEl.innerHTML = '';
    return;
  }

  var todayTasks = rest.filter(function(t) {
    var created = t.created_at ? new Date(t.created_at).getTime() : Date.now();
    var d = Math.floor((Date.now() - created) / 86400000);
    return d <= 2 || calcRisk(t) >= 4;
  });
  var laterTasks = rest.filter(function(t) { return !todayTasks.includes(t); });

  var html = '';
  if (todayTasks.length) {
    html += '<div class="group-header"><span class="group-title">she's asking about these &amp; following up</span><span class="group-count">' + todayTasks.length + ' task' + (todayTasks.length !== 1 ? 's' : '') + '</span></div>';
    html += '<div class="task-list">' + todayTasks.map(function(t) { return taskCard(t, false); }).join('') + '</div>';
  }
  if (laterTasks.length) {
    html += '<div class="group-header"><span class="group-title">whenever you get to it</span><span class="group-count">' + laterTasks.length + '</span></div>';
    html += '<div class="task-list">' + laterTasks.map(function(t) { return taskCard(t, false); }).join('') + '</div>';
  }

  html += '<div class="add-row" onclick="openAddModal()"><div class="add-circle">+</div>What do you need to take care of?</div>';
  el.innerHTML = html;

  if (doneTasks.length) {
    var open = localStorage.getItem('dtm_completed_open') === 'true';
    doneEl.innerHTML = '<div class="completed-toggle" onclick="toggleCompleted(this)">' +
      '<span class="toggle-arrow ' + (open ? 'open' : '') + '">></span>' +
      '<span>' + doneTasks.length + ' completed task' + (doneTasks.length !== 1 ? 's' : '') + '</span>' +
      '</div>' +
      '<div class="completed-list ' + (open ? 'visible' : '') + '">' +
      doneTasks.map(function(t) { return taskCard(t, true); }).join('') +
      '</div>';
  } else {
    doneEl.innerHTML = '';
  }
}

function taskCard(task, isDone) {
  var risk = calcRisk(task);
  var duration = estimateDuration(task.name);
  var actions = smartActions(task.name);
  var hasSmartAction = actions.length > 0;
  var wNudge = !isDone ? weatherNudge(task) : null;
  var scoreClass = risk >= 8 ? 'critical' : risk >= 5 ? 'high' : '';
  var checkClass = isDone ? 'checked' : risk >= 6 ? 'urgent' : hasSmartAction ? 'smart-ready' : '';
  var hasFlag = task.notes && task.notes.needs_discussion;
  var brittanyReaction = task.brittany_reaction;
  var brittanyNote = task.brittany_note;
  var mentions = (task.notes && task.notes.mentions) ? parseInt(task.notes.mentions) : 1;

  var reactionBubble = '';
  if (isDone && brittanyReaction) {
    reactionBubble = '<div class="reaction-bubble">' + brittanyReaction + (brittanyNote ? ' ' + escHtml(brittanyNote) : '') + '</div>';
  }

  return '<div class="task-item ' + (isDone ? 'done-item' : '') + (hasFlag ? ' has-flag' : '') + '" id="task-' + task.id + '">' +
    '<div class="task-check ' + checkClass + '" onclick="event.stopPropagation(); ' + (isDone ? 'undoTask(\'' + task.id + '\')' : 'completeTask(\'' + task.id + '\')') + '"></div>' +
    '<div class="task-body" onclick="openDetail(\'' + task.id + '\')">' +
    '<div class="task-title ' + (isDone ? 'done' : '') + '">' + escHtml(task.name || '') + '</div>' +
    '<div class="task-chips">' +
    '<span class="task-chip">' + duration.label + '</span>' +
    '<span class="task-chip">' + capitalize((task.notes && task.notes.location) || 'anywhere') + '</span>' +
    (risk >= 6 && !isDone ? '<span class="task-chip urgent-chip">Priority</span>' : '') +
    (hasFlag && !isDone ? '</div><div class="task-flag-banner">💬 <strong>Brittany wants to discuss this</strong> -- tap for details' : '') +
    (hasSmartAction && !isDone ? '<span class="task-chip smart-chip">Smart action ready</span>' : '') +
    (wNudge ? '<span class="task-chip" style="background:var(--gold-pale);color:#5C420A;border-color:var(--gold-border);">' + wNudge + '</span>' : '') +
    (isDone ? '<span class="task-chip">Done</span>' : '') +
    '</div>' +
    reactionBubble +
    '</div>' +
    (!isDone ? '<div class="task-score ' + scoreClass + '">' + Math.round(risk) + '</div>' : '') +
    '</div>';
}

// =============================================
// TASK ACTIONS
// =============================================
async function completeTask(id, fromFocus) {
  var task = tasks.find(function(t) { return t.id === id; });
  if (!task) return;
  var el = document.getElementById('task-' + id);
  if (el && !fromFocus) el.classList.add('completing');
  setTimeout(async function() {
    try {
      await sbFetch('tasks?id=eq.' + id, {
        method: 'PATCH',
        prefer: 'return=minimal',
        body: JSON.stringify({ completed: true, completed_at: new Date().toISOString() })
      });
      task.completed = true;
      task.completed_at = new Date().toISOString();
      render();
      showToast((task.requester === 'Brittany' || task.requester === 'Wife') ? 'Done! Brittany will love this' : 'Task complete!');
      closeDetailModal();
    } catch(e) {
      showToast('Could not save -- try again');
      if (el) el.classList.remove('completing');
    }
  }, fromFocus ? 0 : 300);
}

async function undoTask(id) {
  try {
    await sbFetch('tasks?id=eq.' + id, {
      method: 'PATCH',
      prefer: 'return=minimal',
      body: JSON.stringify({ completed: false, completed_at: null })
    });
    var task = tasks.find(function(t) { return t.id === id; });
    if (task) { task.completed = false; task.completed_at = null; }
    render();
    showToast('Task moved back to active');
  } catch(e) { showToast('Could not update -- try again'); }
}

async function snoozeTask(id) {
  var task = tasks.find(function(t) { return t.id === id; });
  if (!task) return;
  var updatedNotes = Object.assign({}, task.notes || {}, { snoozed: true, snoozedAt: Date.now() });
  try {
    await sbFetch('tasks?id=eq.' + id, {
      method: 'PATCH',
      prefer: 'return=minimal',
      body: JSON.stringify({ notes: updatedNotes })
    });
    task.notes = updatedNotes;
    render();
    showToast('Snoozed -- it\'ll come back around');
  } catch(e) { showToast('Could not snooze -- try again'); }
}

async function deleteTask(id) {
  try {
    await sbFetch('tasks?id=eq.' + id, {
      method: 'DELETE',
      prefer: 'return=minimal',
    });
    tasks = tasks.filter(function(t) { return t.id !== id; });
    render();
    closeDetailModal();
    showToast('Task removed');
  } catch(e) { showToast('Could not remove -- try again'); }
}

async function saveAdamNote(id) {
  var input = document.getElementById('adam-note-' + id);
  if (!input) return;
  var task = tasks.find(function(t) { return t.id === id; });
  if (!task) return;
  var updatedNotes = Object.assign({}, task.notes || {}, {
    needs_discussion: false,
    adam_reply: input.value.trim(),
    adam_note: input.value.trim()
  });
  try {
    await sbFetch('tasks?id=eq.' + id, {
      method: 'PATCH',
      prefer: 'return=minimal',
      body: JSON.stringify({ notes: updatedNotes })
    });
    task.notes = updatedNotes;
    render();
    closeDetailModal();
    showToast(input.value.trim() ? 'Note saved -- Brittany will see it' : 'Note cleared');
  } catch(e) { showToast('Could not save -- try again'); }
}

// =============================================
// ADD TASK
// =============================================
function openAddModal() {
  document.getElementById('add-modal').classList.add('visible');
  setTimeout(function() { document.getElementById('task-description').focus(); }, 100);
}
function closeAddModal() {
  document.getElementById('add-modal').classList.remove('visible');
  document.getElementById('task-description').value = '';
  selectedRequester = 'Brittany';
  document.querySelectorAll('.requester-btn').forEach(function(b) {
    b.classList.toggle('selected', b.dataset.val === 'Brittany');
  });
}
function selectRequester(btn) {
  selectedRequester = btn.dataset.val;
  document.querySelectorAll('.requester-btn').forEach(function(b) { b.classList.remove('selected'); });
  btn.classList.add('selected');
}
async function submitTask() {
  var desc = document.getElementById('task-description').value.trim();
  if (!desc) { showToast('Describe the task first'); return; }
  var btn = document.getElementById('btn-add-submit');
  btn.disabled = true; btn.textContent = 'Adding...';
  try {
    var result = await sbFetch('tasks', {
      method: 'POST',
      body: JSON.stringify({
        name: desc,
        requester: selectedRequester,
        priority: 'medium',
        completed: false,
        notes: {
          location: document.getElementById('task-location').value,
          mentions: parseInt(document.getElementById('task-mentions').value),
          snoozed: false,
        }
      })
    });
    if (result && result[0]) tasks.push(result[0]);
    render();
    closeAddModal();
    showToast('Added to your list');
  } catch(e) {
    showToast('Could not add task -- try again');
  } finally {
    btn.disabled = false; btn.textContent = 'Add to list';
  }
}

// =============================================
// RELATIONSHIP DATES (Supabase)
// =============================================
async function loadRelDates() {
  try {
    var data = await sbFetch('rel_dates?select=*&order=date.asc');
    relDates = data || [];
    if (!relDates.length) {
      var defaults = [
        { title: 'Anniversary', emoji: '💍', date: nextOccurrence(6, 14), remind: 60 },
        { title: 'Brittany birthday', emoji: '🎂', date: nextOccurrence(8, 3), remind: 30 },
      ];
      for (var d of defaults) {
        var result = await sbFetch('rel_dates', { method: 'POST', body: JSON.stringify(d) });
        if (result && result[0]) relDates.push(result[0]);
      }
    }
    render();
  } catch(e) { console.error('Could not load rel dates', e); relDates = []; }
}
function nextOccurrence(month, day) {
  var now = new Date();
  var year = now.getFullYear();
  var d = new Date(year, month - 1, day);
  if (d <= now) d.setFullYear(year + 1);
  return d.toISOString().split('T')[0];
}
function openRelModal() { document.getElementById('rel-modal').classList.add('visible'); }
function closeRelModal() {
  document.getElementById('rel-modal').classList.remove('visible');
  document.getElementById('rel-title').value = '';
  document.getElementById('rel-date').value = '';
}
function selectRelType(btn) {
  selectedRelEmoji = btn.dataset.emoji;
  document.querySelectorAll('.rel-type-btn').forEach(function(b) { b.classList.remove('selected'); });
  btn.classList.add('selected');
}
async function submitRelDate() {
  var title = document.getElementById('rel-title').value.trim();
  var date = document.getElementById('rel-date').value;
  if (!title || !date) { showToast('Add a title and date'); return; }
  try {
    var result = await sbFetch('rel_dates', {
      method: 'POST',
      body: JSON.stringify({ title: title, emoji: selectedRelEmoji, date: date, remind: parseInt(document.getElementById('rel-remind').value) })
    });
    if (result && result[0]) relDates.push(result[0]);
    render();
    closeRelModal();
    showToast('Date saved');
  } catch(e) { showToast('Could not save date -- try again'); }
}

// =============================================
// DETAIL MODAL
// =============================================
function openDetail(id) {
  var task = tasks.find(function(t) { return t.id === id; });
  if (!task) return;
  currentDetailId = id;
  var risk = calcRisk(task);
  var duration = estimateDuration(task.name);
  var actions = smartActions(task.name);
  var created = task.created_at ? new Date(task.created_at).getTime() : Date.now();
  var daysOld = Math.floor((Date.now() - created) / 86400000);
  var mentions = (task.notes && task.notes.mentions) ? parseInt(task.notes.mentions) : 1;
  var hasFlag = task.notes && task.notes.needs_discussion;
  var brittanyNote = task.notes && task.notes.brittany_note;
  var adamReply = task.notes && task.notes.adam_reply;

  var smartHTML = actions.map(function(a) {
    return '<div class="detail-smart-block"><div class="detail-smart-label">Smart action</div><div class="detail-smart-text">' + a.text + '</div><button class="detail-smart-action" onclick="showToast(\'Opening...\')">' + a.cta + '</button></div>';
  }).join('');

  // Flag block - shown when Brittany flags for discussion
  var flagHTML = '';
  if (hasFlag && !task.completed) {
    flagHTML = '<div class="detail-flag-block">' +
      '<div class="detail-flag-label">💬 Brittany wants to discuss this</div>' +
      (brittanyNote ? '<div class="detail-flag-text">' + escHtml(brittanyNote) + '</div>' : '<div class="detail-flag-text">She flagged this task for discussion.</div>') +
      '</div>';
  }

  // Always show notes/update field on active tasks
  var existingNote = task.notes && task.notes.adam_note ? task.notes.adam_note : '';
  var notesHTML = !task.completed ? '<div style="margin-top:14px;">' +
      '<div style="font-size:11px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;">Your notes / update</div>' +
      '<textarea class="detail-reply-input" id="adam-note-' + id + '" placeholder="Add a note, update, or reply for Brittany...">' + escHtml(existingNote) + '</textarea>' +
      '<button class="btn-reply" onclick="saveAdamNote(\'' + id + '\')">Save note</button>' +
      (adamReply ? '<div style="font-size:11px;color:var(--text-tertiary);margin-top:6px;">Last saved: ' + escHtml(adamReply) + '</div>' : '') +
      '</div>' : '';

  var reactionHTML = '';
  if (task.completed && task.brittany_reaction) {
    reactionHTML = '<div style="background:var(--rose-light);border:0.5px solid var(--rose-border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:12px;">' +
      '<div style="font-size:10px;font-weight:500;color:var(--rose);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;">Brittany\'s reaction</div>' +
      '<div style="font-size:18px;">' + task.brittany_reaction + (task.brittany_note ? ' <span style="font-size:13px;color:#6B2535;">' + escHtml(task.brittany_note) + '</span>' : '') + '</div>' +
      '</div>';
  }

  var actionsHTML = !task.completed
    ? '<div class="detail-actions"><button class="btn-detail-done" onclick="completeTask(\'' + id + '\')">Mark it done ✓</button><button class="btn-detail-delete" onclick="deleteTask(\'' + id + '\')">Remove</button></div>'
    : '<div style="margin-top:16px;display:flex;gap:8px;"><button class="btn-detail-delete" style="flex:1;color:var(--text-secondary);border-color:var(--border-mid);" onclick="undoTask(\'' + id + '\');closeDetailModal()">Undo completion</button><button class="btn-detail-delete" onclick="deleteTask(\'' + id + '\')">Remove</button></div>';

  document.getElementById('detail-content').innerHTML =
    '<div style="font-family:\'Fraunces\',serif;font-size:19px;font-weight:500;line-height:1.3;margin-bottom:12px;">' + escHtml(task.name || '') + '</div>' +
    '<div class="detail-chips">' +
    '<span class="detail-chip">From: ' + (task.requester === 'Brittany' ? 'Brittany' : task.requester) + '</span>' +
    '<span class="detail-chip">' + duration.label + '</span>' +
    '<span class="detail-chip">' + capitalize((task.notes && task.notes.location) || 'anywhere') + '</span>' +
    '<span class="detail-chip">Mentioned ' + mentions + 'x</span>' +
    '<span class="detail-chip">' + (daysOld === 0 ? 'Added today' : daysOld + ' day' + (daysOld !== 1 ? 's' : '') + ' on list') + '</span>' +
    '<span class="detail-chip" style="background:var(--gold-pale);color:#5C420A;border-color:var(--gold-border);">Risk: ' + Math.round(risk) + '/10</span>' +
    '</div>' +
    flagHTML +
    reactionHTML +
    smartHTML +
    notesHTML +
    actionsHTML;

  document.getElementById('detail-modal').classList.add('visible');
}
function closeDetailModal() {
  document.getElementById('detail-modal').classList.remove('visible');
}

// =============================================
// COMPLETED TOGGLE
// =============================================
function toggleCompleted(el) {
  var arrow = el.querySelector('.toggle-arrow');
  var list = el.nextElementSibling;
  var open = list.classList.toggle('visible');
  arrow.classList.toggle('open', open);
  localStorage.setItem('dtm_completed_open', open);
}

// =============================================
// UTILS
// =============================================
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2800);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
function formatDate(dateStr) {
  var d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
}

document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) overlay.classList.remove('visible');
  });
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay').forEach(function(m) { m.classList.remove('visible'); });
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openAddModal(); }
});

// =============================================
// BOOT
// =============================================
updateContext();
loadWeather();
loadTasks();
loadRelDates();

// Auto-refresh tasks every 30 seconds to pick up Brittany's changes
setInterval(function() {
  loadTasks();
}, 30000);
</script>
